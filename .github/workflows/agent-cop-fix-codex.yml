name: Agent Cop Fix (Codex)

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo test --lib --no-run 2>&1

      - name: Compute identifiers
        id: cop
        run: |
          python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          cop_snake = snake(name)
          print(f'branch=fix/{dept_dir}-{cop_snake}')
          print(f'filter=cop::{dept_dir}::{cop_snake}')
          " "${{ github.event.inputs.cop }}" >> "$GITHUB_OUTPUT"

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/generate-cop-task.py \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --output /tmp/task.md
          wc -l /tmp/task.md

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Prepare clean workspace for agent
        run: |
          echo "main_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git rm -r --quiet \
            CLAUDE.md AGENTS.md \
            .claude/ .agents/ .devcontainer/ .github/ \
            bench/ docs/ gem/ scripts/ \
            2>/dev/null || true
          git commit -m "tmp: clean workspace for agent"
        id: prep

      - name: Run Codex agent (GPT 5.4)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          codex exec --full-auto -m gpt-5.4 - < /tmp/task.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Validate and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.cop.outputs.branch }}"
          COP="${{ github.event.inputs.cop }}"

          git add -A
          git commit -m "agent changes" --allow-empty

          git diff "${{ steps.prep.outputs.main_sha }}" HEAD -- src/cop/ tests/fixtures/cops/ > /tmp/agent.patch

          git checkout main

          if [ -s /tmp/agent.patch ]; then
            git apply /tmp/agent.patch

            cargo test --lib --no-run 2>&1
            cargo test --lib -- "${{ steps.cop.outputs.filter }}" 2>&1
            echo "Tests pass for ${COP}"

            git push origin --delete "$BRANCH" 2>/dev/null || true
            git checkout -b "$BRANCH"
            git add src/cop/ tests/fixtures/cops/
            git commit -m "Fix ${COP}: agent-generated fix

          Co-Authored-By: codex <noreply@github.com>"

            git push -u origin "$BRANCH"

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Fix ${COP}: agent-generated conformance fix" \
              --body "Automated fix for ${COP} by Codex (GPT 5.4).

          ## Validation
          - [x] cargo test --lib passes for this cop
          - [ ] Full CI (checks.yml)
          - [ ] Corpus count check (agent-cop-check.yml)
          "
          else
            echo "No cop file changes found in agent output"
          fi
