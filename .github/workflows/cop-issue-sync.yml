name: Cop Issue Sync

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

on:
  workflow_dispatch:
    inputs:
      department:
        description: "Only sync cops in this department (e.g., Rails, Style, Performance). Empty = all."
        required: false
        type: string
        default: ""

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

      - name: Build nitrocop binary
        run: cargo build

      - name: Sync tracker issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ARGS=(
            --repo "${{ github.repository }}"
            --binary target/debug/nitrocop
          )
          if [ -n "${{ github.event.inputs.department }}" ]; then
            ARGS+=(--department "${{ github.event.inputs.department }}")
          fi
          python3 scripts/dispatch-cops.py issues-sync "${ARGS[@]}"
