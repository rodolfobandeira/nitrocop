name: Batch Dispatch

run-name: >-
  Batch Dispatch: ${{ github.event.inputs.department || 'all' }}
  × ${{ github.event.inputs.count }} (${{ github.event.inputs.backend }})

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      department:
        description: 'Department to target (e.g., Style, Layout, Lint). Empty = all.'
        required: false
        type: string
        default: ''
      count:
        description: 'Number of cops to dispatch'
        required: true
        type: number
        default: 10
      backend:
        description: 'Backend for dispatched agents'
        type: choice
        options:
          - codex
          - claude
          - auto
        default: codex
      min_bugs:
        description: 'Minimum code bugs to include a cop'
        type: number
        default: 1
      max_total:
        description: 'Maximum total FP+FN to include a cop'
        type: number
        default: 999
      mode:
        description: 'Mode passed to agent-cop-fix'
        type: choice
        options:
          - fix
          - retry
        default: fix

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-agent-env
        with:
          rust_components: ''
          install_vendor_gems: 'false'

      - name: Build nitrocop binary
        run: cargo build

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Rank and dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_DEPARTMENT: ${{ github.event.inputs.department }}
          INPUT_COUNT: ${{ github.event.inputs.count }}
          INPUT_BACKEND: ${{ github.event.inputs.backend }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_MIN_BUGS: ${{ github.event.inputs.min_bugs }}
          INPUT_MAX_TOTAL: ${{ github.event.inputs.max_total }}
        run: |
          python3 scripts/workflows/batch_dispatch.py
