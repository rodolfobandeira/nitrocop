name: Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        if: matrix.os == 'ubuntu-24.04'
        run: cargo fmt --check

      - name: Validate corpus manifest
        if: matrix.os == 'ubuntu-24.04'
        run: python3 bench/corpus/validate_manifest.py

      - name: No vendor include macros
        if: matrix.os == 'ubuntu-24.04'
        run: bash scripts/check_no_vendor_include_macros.sh

      - name: Gem builder tests
        if: matrix.os == 'ubuntu-24.04'
        run: ruby gem/test/gem_builder_test.rb

      - name: Python script tests
        if: matrix.os == 'ubuntu-24.04'
        run: |
          for f in tests/python/test_*.py; do
            echo "=== $f ==="
            python3 "$f"
          done

      - name: Clippy
        if: matrix.os == 'ubuntu-24.04'
        run: cargo clippy --profile ci -- -D warnings

      # On ubuntu, clippy verifies compilation and corpus-smoke-test builds --release
      # (same settings as --profile ci), so an explicit build step here is redundant.
      # On macos, we still build --profile ci to catch cross-platform linking issues.
      - name: Build
        if: matrix.os == 'macos-latest'
        run: cargo build --profile ci

      # Compile test binaries in debug mode (dev profile, opt-level=1) rather than
      # --profile ci (release + thin LTO). Test compilation with LTO was the main
      # bottleneck: ~4m on ubuntu vs ~1.5m in debug. Test runtime stays under 30s.
      # --no-run compiles all test binaries once up front so the per-filter steps
      # below are instant and their step names show up clearly in the CI UI.
      - name: Compile tests
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test --no-run

      - name: NodePattern verifier
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test verifier -- --nocapture

      - name: Config audit
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test config_audit -- --nocapture

      - name: Prism pitfalls
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test prism_pitfalls -- --nocapture

      - name: File discovery sync
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test file_discovery_sync -- --nocapture

      - name: Test
        run: cargo test

  # Corpus cop check: for any changed cops, compare nitrocop offense counts
  # against the cached corpus oracle baseline. Fast (~30s per cop).
  cop-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Detect changed cops
        id: cops
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          python3 scripts/agent/detect_changed_cops.py \
            --base "$BASE" --head HEAD > /tmp/changed_cops.txt
          echo "Changed cops:"
          cat /tmp/changed_cops.txt
          if [ -s /tmp/changed_cops.txt ]; then
            echo "has_cops=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cops=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.cops.outputs.has_cops == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.cops.outputs.has_cops == 'true'

      - name: Build release binary
        if: steps.cops.outputs.has_cops == 'true'
        run: cargo build --release

      - name: Check cops against corpus baseline
        if: steps.cops.outputs.has_cops == 'true'
        env:
          NITROCOP_BIN: ${{ github.workspace }}/target/release/nitrocop
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=0
          while IFS= read -r cop; do
            [ -z "$cop" ] && continue
            echo ""
            echo "=============================="
            echo "Checking: $cop (vs cached corpus oracle baseline)"
            echo "=============================="
            if ! python3 scripts/check-cop.py "$cop" --extended --verbose; then
              echo "WARN: $cop check reported issues"
              failed=$((failed + 1))
            fi
          done < /tmp/changed_cops.txt

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "WARNING: $failed cop(s) had check issues. Review above output."
          fi

  # Corpus smoke test: run nitrocop + rubocop on a few cheap sentinel repos to
  # catch systemic regressions (file discovery, config, plugin loading, directives)
  # before they reach the full 1000-repo corpus oracle.
  corpus-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - uses: ruby/setup-ruby@v1

      - name: Cache corpus bundle
        uses: actions/cache@v4
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-smoke-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Install corpus gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run smoke test
        run: python3 scripts/corpus_smoke_test.py --binary target/release/nitrocop
