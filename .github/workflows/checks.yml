name: Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  # Skip checks on empty PRs (agent-cop-fix creates a placeholder commit with
  # zero changed files before the agent starts).  We use a paths filter instead
  # of [skip ci] because the commit message survives squash-merge and would
  # suppress the post-merge CI run on main.
  pull_request:
    paths:
      - "**/*"

jobs:
  # Shared Linux release build — cop-check shards and corpus-smoke-test download
  # this artifact instead of rebuilding (~2 min saved per job).
  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - uses: actions/upload-artifact@v6
        with:
          name: nitrocop-linux
          path: target/release/nitrocop
          retention-days: 1

  build-and-test:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Validate corpus manifest
        run: python3 bench/corpus/validate_manifest.py

      - name: No vendor include macros
        run: bash scripts/workflows/check_no_vendor_include_macros.sh

      - uses: astral-sh/setup-uv@v6

      - name: Python lint
        run: uv run ruff check scripts tests/python bench/corpus

      - name: Gem builder tests
        run: ruby gem/test/gem_builder_test.rb

      - name: Python script tests
        run: uv run pytest tests/python/ -v

      - name: Clippy
        run: cargo clippy --profile ci -- -D warnings

      - name: Compile tests
        run: cargo test --no-run

      - name: NodePattern verifier
        run: cargo test verifier -- --nocapture

      - name: Config audit
        run: cargo test config_audit -- --nocapture

      - name: Prism pitfalls
        run: cargo test prism_pitfalls -- --nocapture

      - name: File discovery sync
        run: cargo test file_discovery_sync -- --nocapture

      - name: Test
        run: cargo test

  # macOS: build-only on PRs, build + test on main
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --profile ci
      - name: Test
        if: github.ref == 'refs/heads/main'
        run: cargo test

  # Corpus cop check: for any changed cops, re-run nitrocop on corpus repos
  # and compare offense counts against the RuboCop baseline. Catches regressions
  # before they reach the full 1000-repo corpus oracle.
  # --rerun: runs the new binary and auto-filters to relevant repos
  cop-detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      has_cops: ${{ steps.cops.outputs.has_cops }}
      changed_cops: ${{ steps.cops.outputs.changed_cops }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Detect changed cops
        id: cops
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          python3 scripts/dispatch_cops.py changed \
            --base "$BASE" --head HEAD > /tmp/changed_cops.txt
          echo "Changed cops:"
          cat /tmp/changed_cops.txt
          if [ -s /tmp/changed_cops.txt ]; then
            echo "has_cops=true" >> "$GITHUB_OUTPUT"
            echo "changed_cops=$(paste -sd',' /tmp/changed_cops.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "has_cops=false" >> "$GITHUB_OUTPUT"
            echo "changed_cops=" >> "$GITHUB_OUTPUT"
          fi

  cop-check:
    needs: [cop-detect, build-linux]
    if: needs.cop-detect.outputs.has_cops == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/download-artifact@v6
        with:
          name: nitrocop-linux
          path: target/release
      - run: chmod +x target/release/nitrocop

      - uses: ruby/setup-ruby@v1

      - name: Cache corpus bundle
        uses: actions/cache@v5
        with:
          path: bench/corpus/vendor/bundle
          key: cop-check-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Install corpus gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Check cops against corpus baseline (shard ${{ matrix.shard }}/4)
        env:
          NITROCOP_BIN: ${{ github.workspace }}/target/release/nitrocop
          GH_TOKEN: ${{ github.token }}
        run: |
          IFS=',' read -ra COPS <<< "${{ needs.cop-detect.outputs.changed_cops }}"
          failed=0
          mkdir -p /tmp/cop-check-summary
          for cop in "${COPS[@]}"; do
            [ -z "$cop" ] && continue
            echo ""
            echo "=============================="
            echo "Checking: $cop (shard ${{ matrix.shard }}/4)"
            echo "=============================="
            OUTPUT=$(python3 scripts/check_cop.py "$cop" --verbose --rerun --clone \
                 --shard-index ${{ matrix.shard }} --total-shards 8 2>&1) || true
            echo "$OUTPUT"
            # Extract SUMMARY line and save for gate job
            echo "$OUTPUT" | grep '^SUMMARY|' | sed 's/^SUMMARY|//' \
              >> /tmp/cop-check-summary/shard-${{ matrix.shard }}.txt
            if echo "$OUTPUT" | grep -q "^FAIL:"; then
              echo "FAIL: $cop regression detected in shard ${{ matrix.shard }}"
              failed=$((failed + 1))
            fi
          done

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "FAILED: $failed cop(s) regressed vs corpus baseline."
            exit 1
          fi

      - name: Upload cop-check summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cop-check-summary-${{ matrix.shard }}
          path: /tmp/cop-check-summary/
          retention-days: 1

  # Roll-up for branch protection — add "cop-check-gate" as a required check
  cop-check-gate:
    if: always()
    needs: [cop-detect, cop-check]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Gate check
        id: gate
        run: |
          if [ "${{ needs.cop-detect.outputs.has_cops }}" != "true" ]; then
            echo "No cops changed — gate passes"
            echo "result=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ needs.cop-check.result }}" = "success" ]; then
            echo "All shards passed"
            echo "result=pass" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Cancelled shards (e.g. from concurrency group cancellation) are
          # not actionable failures — skip the PR comment entirely.
          if [ "${{ needs.cop-check.result }}" = "cancelled" ]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
            echo "cop-check was cancelled — skipping comment"
            exit 1
          fi
          echo "result=fail" >> "$GITHUB_OUTPUT"
          echo "cop-check failed: ${{ needs.cop-check.result }}"
          exit 1

      - name: Generate app token
        if: always() && github.event_name == 'pull_request' && !contains(fromJSON('["skip","cancelled"]'), steps.gate.outputs.result)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Download cop-check summaries
        if: always() && github.event_name == 'pull_request' && !contains(fromJSON('["skip","cancelled"]'), steps.gate.outputs.result)
        uses: actions/download-artifact@v8
        with:
          pattern: cop-check-summary-*
          path: summaries/
          merge-multiple: true
        continue-on-error: true

      - name: Comment cop-check summary on PR
        if: always() && github.event_name == 'pull_request' && !contains(fromJSON('["skip","cancelled"]'), steps.gate.outputs.result)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RESULT="${{ steps.gate.outputs.result }}"
          ICON="✅"
          [ "$RESULT" = "fail" ] && ICON="❌"

          BODY="${ICON} **Cop-check results** (8 shards)\n\n"
          BODY+="| Cop | Baseline FP | Baseline FN | New FP | New FN | Result |\n"
          BODY+="|-----|-----------|-----------|--------|--------|--------|\n"

          if [ -d summaries ]; then
            for f in summaries/*.txt; do
              [ -f "$f" ] || continue
              while IFS='|' read -r cop bl_fp bl_fn new_fp new_fn shard_result; do
                STATUS="✅"
                [ "$shard_result" = "fail" ] && STATUS="❌"
                BODY+="| \`${cop}\` | ${bl_fp} | ${bl_fn} | ${new_fp} | ${new_fn} | ${STATUS} |\n"
              done < "$f"
            done
          else
            BODY+="| (no shard data) | | | | | ${RESULT} |\n"
          fi

          if [ "$RESULT" = "pass" ]; then
            BODY+="\nAll shards passed — ready to merge.\n"
          else
            BODY+="\nRegressions detected. The repair workflow will attempt an automatic fix.\n"
          fi

          printf "$BODY" | gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --body-file -

  # Corpus smoke test: run nitrocop + rubocop on a few cheap sentinel repos to
  # catch systemic regressions (file discovery, config, plugin loading, directives)
  # before they reach the full 1000-repo corpus oracle.
  corpus-smoke-test:
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}

      - uses: actions/download-artifact@v6
        with:
          name: nitrocop-linux
          path: target/release
      - run: chmod +x target/release/nitrocop

      - uses: ruby/setup-ruby@v1

      - name: Cache corpus bundle
        uses: actions/cache@v5
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-smoke-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Install corpus gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run smoke test
        run: python3 scripts/corpus_smoke_test.py --binary target/release/nitrocop
