name: Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Shared Linux release build — cop-check shards and corpus-smoke-test download
  # this artifact instead of rebuilding (~2 min saved per job).
  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - uses: actions/upload-artifact@v6
        with:
          name: nitrocop-linux
          path: target/release/nitrocop
          retention-days: 1

  build-and-test:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Validate corpus manifest
        run: python3 bench/corpus/validate_manifest.py

      - name: No vendor include macros
        run: bash scripts/workflows/check_no_vendor_include_macros.sh

      - uses: astral-sh/setup-uv@v6

      - name: Python lint
        run: uv run ruff check scripts tests/python bench/corpus

      - name: Gem builder tests
        run: ruby gem/test/gem_builder_test.rb

      - name: Python script tests
        run: uv run pytest tests/python/ -v

      - name: Clippy
        run: cargo clippy --profile ci -- -D warnings

      - name: Compile tests
        run: cargo test --no-run

      - name: NodePattern verifier
        run: cargo test verifier -- --nocapture

      - name: Config audit
        run: cargo test config_audit -- --nocapture

      - name: Prism pitfalls
        run: cargo test prism_pitfalls -- --nocapture

      - name: File discovery sync
        run: cargo test file_discovery_sync -- --nocapture

      - name: Test
        run: cargo test

  # macOS: build-only on PRs, build + test on main
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --profile ci
      - name: Test
        if: github.ref == 'refs/heads/main'
        run: cargo test

  # Corpus cop check: for any changed cops, re-run nitrocop on corpus repos
  # and compare offense counts against the RuboCop baseline. Catches regressions
  # before they reach the full 1000-repo corpus oracle.
  # --rerun: actually runs the new binary (not just cached results)
  # --quick: only repos with baseline activity for the cop (3-10x faster)
  cop-check:
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Detect changed cops
        id: cops
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          python3 scripts/dispatch_cops.py changed \
            --base "$BASE" --head HEAD > /tmp/changed_cops.txt
          echo "Changed cops:"
          cat /tmp/changed_cops.txt
          if [ -s /tmp/changed_cops.txt ]; then
            echo "has_cops=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cops=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v6
        if: steps.cops.outputs.has_cops == 'true'
        with:
          name: nitrocop-linux
          path: target/release
      - run: chmod +x target/release/nitrocop
        if: steps.cops.outputs.has_cops == 'true'

      - uses: ruby/setup-ruby@v1
        if: steps.cops.outputs.has_cops == 'true'

      - name: Cache corpus bundle
        if: steps.cops.outputs.has_cops == 'true'
        uses: actions/cache@v5
        with:
          path: bench/corpus/vendor/bundle
          key: cop-check-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Install corpus gems
        if: steps.cops.outputs.has_cops == 'true'
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Check cops against corpus baseline
        if: steps.cops.outputs.has_cops == 'true'
        env:
          NITROCOP_BIN: ${{ github.workspace }}/target/release/nitrocop
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=0
          while IFS= read -r cop; do
            [ -z "$cop" ] && continue
            echo ""
            echo "=============================="
            echo "Checking: $cop (re-running against corpus)"
            echo "=============================="
            if ! python3 scripts/check_cop.py "$cop" --verbose --rerun --quick --clone; then
              echo "FAIL: $cop regression detected"
              failed=$((failed + 1))
            fi
          done < /tmp/changed_cops.txt

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "FAILED: $failed cop(s) regressed vs corpus baseline."
            exit 1
          fi

  # Corpus smoke test: run nitrocop + rubocop on a few cheap sentinel repos to
  # catch systemic regressions (file discovery, config, plugin loading, directives)
  # before they reach the full 1000-repo corpus oracle.
  corpus-smoke-test:
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref || '' }}

      - uses: actions/download-artifact@v6
        with:
          name: nitrocop-linux
          path: target/release
      - run: chmod +x target/release/nitrocop

      - uses: ruby/setup-ruby@v1

      - name: Cache corpus bundle
        uses: actions/cache@v5
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-smoke-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Install corpus gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run smoke test
        run: python3 scripts/corpus_smoke_test.py --binary target/release/nitrocop
