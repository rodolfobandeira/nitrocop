name: Cop Issue Dispatch

permissions:
  actions: write
  contents: read
  issues: read
  pull-requests: read

on:
  workflow_dispatch:
    inputs:
      max_active:
        description: "Maximum active bot PRs / in-flight cop-fix runs"
        required: false
        type: string
        default: "5"
      backend_override:
        description: "Override backend family for all dispatched issues"
        type: choice
        options:
          - auto
          - codex
          - claude
          - minimax
        default: auto
      department:
        description: "Only dispatch cops in this department (e.g., Rails, Style, Performance). Empty = all."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Only print which issues would be dispatched"
        required: false
        type: boolean
        default: false

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Dispatch backlog issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=(
            --repo "${{ github.repository }}"
            --max-active "${{ github.event.inputs.max_active }}"
            --backend-family-override "${{ github.event.inputs.backend_override }}"
            --strength-override "hard"
          )
          if [ -n "${{ github.event.inputs.department }}" ]; then
            ARGS+=(--department "${{ github.event.inputs.department }}")
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python3 scripts/dispatch_cops.py dispatch-issues "${ARGS[@]}"
