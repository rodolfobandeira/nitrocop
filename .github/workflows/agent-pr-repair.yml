name: Agent PR Repair

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
    && format('Agent PR Repair: PR #{0}', github.event.inputs.pr_number)
    || github.event_name == 'pull_request'
    && format('Agent PR Repair: PR #{0} (closed)', github.event.pull_request.number)
    || format('Agent PR Repair: {0}', github.event.workflow_run.display_title)
  }}

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

on:
  workflow_run:
    workflows: ["Checks"]
    types: [completed]
  # Cancellation-only trigger: a closed PR re-enters the same concurrency group
  # and cancels any in-flight repair for that PR before it can publish.
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Target PR number"
        required: true
        type: string
      checks_run_id:
        description: "Failed Checks workflow run ID"
        required: true
        type: string
      backend:
        description: "Backend family override"
        type: choice
        options:
          - auto
          - codex
          - claude
          - minimax
        default: auto
      strength:
        description: "Model strength override"
        type: choice
        options:
          - auto
          - normal
          - hard
        default: auto
      extra_context:
        description: "Additional instructions for the repair agent"
        required: false
        type: string
      force:
        description: "Allow rerunning even if normal auto-repair retry limits have been hit"
        required: false
        type: boolean
        default: false

concurrency:
  # Don't cancel in-progress repairs — a 45-min agent run is too expensive to discard.
  # Queued repairs will wait and skip if the running one already fixed the issue.
  group: agent-pr-repair-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number || (github.event_name == 'workflow_run' && github.event.workflow_run.pull_requests[0].number) || (github.event_name == 'pull_request' && github.event.pull_request.number) || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  repair:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h / | tail -1

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Generate read-only GitHub token
        id: actions-read-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read
          permission-metadata: read
          permission-pull-requests: read

      - name: Resolve target PR
        id: target
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"]) as f:
              event = json.load(f)

          run = event["workflow_run"]
          prs = run.get("pull_requests", [])
          if not prs:
              raise SystemExit("No pull request associated with workflow_run event")

          repo = os.environ["GITHUB_REPOSITORY"]
          print(f"pr_number={prs[0]['number']}")
          print(f"checks_run_id={run['id']}")
          print(f"checks_url=https://github.com/{repo}/actions/runs/{run['id']}")
          print(f"head_sha={run['head_sha']}")
          print(f"head_branch={run['head_branch']}")
          print("backend_family_override=auto")
          print("strength_override=auto")
          print("force=false")
          PY
          else
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "checks_run_id=${{ github.event.inputs.checks_run_id }}" >> "$GITHUB_OUTPUT"
            echo "checks_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.checks_run_id }}" >> "$GITHUB_OUTPUT"
            echo "backend_family_override=${{ github.event.inputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "strength_override=${{ github.event.inputs.strength }}" >> "$GITHUB_OUTPUT"
            echo "force=${{ github.event.inputs.force }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight PR open state
        id: preflight
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          PR_STATE=$(gh pr view "${{ steps.target.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json state --jq '.state')
          echo "state=$PR_STATE" >> "$GITHUB_OUTPUT"
          if [ "$PR_STATE" = "OPEN" ]; then
            echo "should_continue=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=PR is not open" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.preflight.outputs.should_continue == 'true'
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Load PR metadata and gate repair
        id: pr
        if: steps.preflight.outputs.should_continue == 'true'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          PR_JSON=$(gh pr view "${{ steps.target.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json number,title,url,body,state,author,headRefName,headRefOid,baseRefName,isCrossRepository,headRepository,labels)
          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${{ steps.target.outputs.pr_number }}/comments?per_page=100")
          python3 scripts/workflows/repair_retry_policy.py pr-state \
            --pr-json "$PR_JSON" \
            --comments-json "$COMMENTS_JSON" \
            --repo "${{ github.repository }}" \
            --checks-head-sha "${{ steps.target.outputs.head_sha }}" \
            ${{ github.event_name != 'workflow_dispatch' && '--require-trusted-bot' || '' }} \
            >> "$GITHUB_OUTPUT"

      - name: Skip closed PRs
        if: steps.preflight.outputs.should_continue != 'true'
        run: |
          echo "::notice::Skipping auto-repair: ${{ steps.preflight.outputs.skip_reason }}"

      - name: Skip untrusted or stale PRs
        if: steps.preflight.outputs.should_continue == 'true' && steps.pr.outputs.should_run != 'true'
        run: |
          echo "::notice::Skipping auto-repair: ${{ steps.pr.outputs.skip_reason }}"

      - uses: actions/checkout@v6
        if: steps.pr.outputs.should_run == 'true'
        with:
          submodules: true
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_branch }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@v6
        if: steps.pr.outputs.should_run == 'true'

      - name: Initialize runtime layout
        if: steps.pr.outputs.should_run == 'true'
        run: |
          python3 scripts/workflows/agent_runtime.py agent-pr-repair \
            --runner-temp "${RUNNER_TEMP}" >> "$GITHUB_ENV"

      - name: Set git identity
        if: steps.pr.outputs.should_run == 'true'
        run: |
          python3 scripts/workflows/workflow_git.py configure
          git fetch origin main
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        id: prep

      - name: Capture current PR diff
        if: steps.pr.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          git diff --stat origin/main...HEAD > "$PR_DIFF_STAT_FILE"
          gh pr diff "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" > "$PR_DIFF_FILE"

      - name: Prepare repair packet
        if: steps.pr.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          BACKEND_OVERRIDE="auto"
          if [ "${{ steps.target.outputs.backend_family_override }}" != "auto" ]; then
            python3 scripts/workflows/resolve_backend.py choose \
              "${{ steps.target.outputs.backend_family_override }}" \
              "${{ steps.target.outputs.strength_override }}" \
              "hard" > "$RUNNER_TEMP/repair-backend.env"
            BACKEND_OVERRIDE=$(awk -F= '$1 == "backend" { print $2 }' "$RUNNER_TEMP/repair-backend.env")
          fi
          python3 scripts/workflows/prepare_pr_repair.py \
            --repo "${{ github.repository }}" \
            --run-id "${{ steps.target.outputs.checks_run_id }}" \
            --pr-number "${{ steps.pr.outputs.number }}" \
            --pr-title "${{ steps.pr.outputs.title }}" \
            --head-branch "${{ steps.pr.outputs.head_branch }}" \
            --diff-stat "$PR_DIFF_STAT_FILE" \
            --diff "$PR_DIFF_FILE" \
            --prompt-out "$FINAL_TASK_FILE" \
            --verify-out "$REPAIR_VERIFY_SCRIPT" \
            --json-out "$REPAIR_JSON_FILE" \
            --backend-override "$BACKEND_OVERRIDE" \
            --fix-backend "${{ steps.pr.outputs.fix_backend }}" \
            --extra-context "${{ github.event.inputs.extra_context || '' }}" \
            >> "$GITHUB_OUTPUT"
        id: repair

      - name: Apply retry policy
        if: steps.pr.outputs.should_run == 'true'
        id: policy
        run: |
          python3 scripts/workflows/repair_retry_policy.py policy \
            --route "${{ steps.repair.outputs.route }}" \
            ${{ steps.target.outputs.force == 'true' && '--force' || '' }} \
            ${{ steps.pr.outputs.prior_attempted_current_head == 'true' && '--prior-attempted-current-head' || '' }} \
            --prior-pushes "${{ steps.pr.outputs.prior_pushes }}" \
            --prior-pr-repair-attempts "${{ steps.pr.outputs.prior_pr_repair_attempts }}" \
            >> "$GITHUB_OUTPUT"

      - name: Detect local cop-check verification
        if: steps.pr.outputs.should_run == 'true'
        id: verify_meta
        run: |
          if grep -q "scripts/check_cop.py" "$REPAIR_VERIFY_SCRIPT"; then
            echo "needs_local_cop_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_local_cop_check=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve backend config
        if: steps.pr.outputs.should_run == 'true' && steps.repair.outputs.route != 'skip'
        id: backend
        run: |
          python3 scripts/workflows/resolve_backend.py "${{ steps.repair.outputs.backend }}" \
            >> "$GITHUB_OUTPUT"

      - name: Append available helper scripts to prompt
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        run: |
          python3 scripts/workflows/render_helper_scripts_section.py >> "$FINAL_TASK_FILE"

      - name: Skip non-repairable failures
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route == 'skip'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 scripts/workflows/repair_retry_policy.py skip-comment \
            --repo "${{ github.repository }}" \
            --pr-number "${{ steps.pr.outputs.number }}" \
            --linked-issue-number "${{ steps.pr.outputs.linked_issue_number }}" \
            --heading "Auto-repair Skipped" \
            --reason "${{ steps.repair.outputs.reason }}" \
            --checks-run-id "${{ steps.target.outputs.checks_run_id }}" \
            --checks-url "${{ steps.target.outputs.checks_url }}" \
            --backend-label "${{ steps.repair.outputs.backend || 'n/a' }}" \
            --route "${{ steps.repair.outputs.route }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Skip bounded auto-repair
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "::notice::Skipping auto-repair: ${{ steps.policy.outputs.skip_reason }}"
          python3 scripts/workflows/repair_retry_policy.py skip-comment \
            --repo "${{ github.repository }}" \
            --pr-number "${{ steps.pr.outputs.number }}" \
            --linked-issue-number "${{ steps.pr.outputs.linked_issue_number }}" \
            --heading "Automatic PR repair stopped" \
            --reason "${{ steps.policy.outputs.skip_reason }}" \
            --checks-run-id "${{ steps.target.outputs.checks_run_id }}" \
            --checks-url "${{ steps.target.outputs.checks_url }}" \
            --backend-label "${{ steps.backend.outputs.display_label || 'n/a' }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Cache corpus bundle
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        uses: actions/cache@v5
        with:
          path: bench/corpus/vendor/bundle
          key: pr-repair-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Cache corpus clones
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.verify_meta.outputs.needs_local_cop_check == 'true'
        uses: actions/cache@v5
        with:
          path: vendor/corpus
          key: pr-repair-corpus-${{ hashFiles('bench/corpus/manifest.jsonl') }}

      # --- Shared environment setup (Rust, Ruby, mold, uv, corpus) ---
      - uses: ./.github/actions/setup-agent-env
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        with:
          rust_components: rustfmt, clippy

      - name: Build release binary for local cop-check diagnosis
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.verify_meta.outputs.needs_local_cop_check == 'true'
        run: cargo build --release

      - name: Precompute local cop-check diagnosis packet
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.verify_meta.outputs.needs_local_cop_check == 'true'
        run: |
          python3 scripts/workflows/precompute_repair_cop_check.py \
            --repo-root "$PWD" \
            --changed-cops-out "$REPAIR_CHANGED_COPS_FILE" \
            --output "$REPAIR_COP_CHECK_PACKET_FILE"

      - name: Append local cop-check diagnosis to prompt
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.verify_meta.outputs.needs_local_cop_check == 'true'
        run: |
          cat "$REPAIR_COP_CHECK_PACKET_FILE" >> "$FINAL_TASK_FILE"

      - name: Compute prompt stats
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        id: prompt
        run: |
          TOKENS=$(python3 scripts/workflows/count_tokens.py "$FINAL_TASK_FILE")
          echo "tokens=$TOKENS" >> "$GITHUB_OUTPUT"
          echo "=== Final prompt stats ==="
          wc -l "$FINAL_TASK_FILE"
          echo "Tokens: $TOKENS"

      - name: Mark repair attempt
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          {
            echo "## Auto-repair Started"
            echo ""
            echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
            echo "- Route: \`${{ steps.repair.outputs.route }}\`"
            echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
            echo "- Model: \`${{ steps.backend.outputs.model_label }}\`"
            echo "- Reason: ${{ steps.repair.outputs.reason }}"
            echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "<details>"
            echo "<summary>Task prompt (${{ steps.prompt.outputs.tokens }} tokens)</summary>"
            echo ""
            cat "$FINAL_TASK_FILE"
            echo ""
            echo "</details>"
            echo ""
            echo "<!-- nitrocop-auto-repair: phase=started head_sha=${{ steps.pr.outputs.head_sha }} backend=${{ steps.repair.outputs.backend }} checks_run_id=${{ steps.target.outputs.checks_run_id }} -->"
          } > "$REPAIR_COMMENT_FILE"
          gh pr comment "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --body-file "$REPAIR_COMMENT_FILE"

      - name: Reconfirm PR is still repairable before agent
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        id: pre_agent_live_pr
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          PR_JSON=$(gh pr view "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --json state,baseRefName,isCrossRepository,headRepository,author,labels,headRefName,headRefOid)
          python3 scripts/workflows/repair_retry_policy.py live-gate \
            --pr-json "$PR_JSON" \
            --repo "${{ github.repository }}" \
            --checks-head-sha "${{ steps.pr.outputs.head_sha }}" \
            ${{ github.event_name != 'workflow_dispatch' && '--require-trusted-bot' || '' }} \
            >> "$GITHUB_OUTPUT"

      - name: Skip closed or moved PR before agent
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip' && steps.pre_agent_live_pr.outputs.should_continue != 'true'
        run: |
          echo "::notice::Skipping auto-repair agent run: ${{ steps.pre_agent_live_pr.outputs.skip_reason }}"

      - name: Run repair agent
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip' && steps.pre_agent_live_pr.outputs.should_continue == 'true'
        id: agent
        uses: ./.github/actions/run-agent
        timeout-minutes: 50
        with:
          backend: ${{ steps.repair.outputs.backend }}
          actions_read_token: ${{ steps.actions-read-token.outputs.token }}
          anthropic_auth_token: ${{ secrets.MINIMAX_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_sha: ${{ steps.prep.outputs.base_sha }}
          workflow: agent-pr-repair

      - name: Validate repair change scope
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip' && steps.pre_agent_live_pr.outputs.should_continue == 'true'
        id: file_guard
        run: |
          python3 scripts/workflows/validate_agent_changes.py \
            --repo-root "$PWD" \
            --base-ref "${{ steps.prep.outputs.base_sha }}" \
            --profile "${{ steps.repair.outputs.guard_profile }}" \
            --report-out "$AGENT_SCOPE_REPORT_FILE" \
            >> "$GITHUB_OUTPUT"

      - name: Validate repair locally
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip' && steps.pre_agent_live_pr.outputs.should_continue == 'true' && steps.file_guard.outputs.valid == 'true'
        id: verify
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
          NITROCOP_BIN: ${{ github.workspace }}/target/release/nitrocop
        run: |
          set +e
          "$REPAIR_VERIFY_SCRIPT" 2>&1 | tee "$REPAIR_VERIFY_LOG"
          STATUS=${PIPESTATUS[0]}
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assess repair result
        if: always() && steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        id: assess
        run: |
          if [ "${{ steps.pre_agent_live_pr.outputs.should_continue }}" != "true" ]; then
            echo "result=stale_pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.agent.outcome }}" != "success" ]; then
            echo "result=agent_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.file_guard.outputs.valid }}" != "true" ]; then
            echo "result=file_guard_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.verify.outcome }}" = "skipped" ] || [ -z "${{ steps.verify.outputs.status }}" ]; then
            echo "result=verify_not_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.verify.outputs.status }}" != "0" ]; then
            echo "result=verify_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-format any changed Rust files before committing
          RUST_FILES=$(git diff --name-only "${{ steps.prep.outputs.base_sha }}" -- '*.rs' | head -200)
          if [ -n "$RUST_FILES" ]; then
            echo "$RUST_FILES" | xargs cargo fmt --
          fi

          # Stage only files in expected directories — never untracked scratch
          # files (e.g. agent investigation output dumps like "full").
          git add -u
          git add src/ tests/ bench/ scripts/ Cargo.toml Cargo.lock 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Repair PR #${{ steps.pr.outputs.number }}: auto-repair (${{ steps.repair.outputs.backend }})"
          fi

          CURRENT_HEAD=$(git rev-parse HEAD)
          echo "head_sha=$CURRENT_HEAD" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_HEAD" = "${{ steps.prep.outputs.base_sha }}" ]; then
            echo "result=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --stat origin/main...HEAD > "$FINAL_PR_DIFF_STAT_FILE" || true
          git diff origin/main...HEAD > "$FINAL_PR_DIFF_FILE" || true

          if git diff --quiet origin/main...HEAD; then
            echo "result=empty_pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=pushable" >> "$GITHUB_OUTPUT"

      # Refresh app token — the original may have expired during the 45-min agent run
      # plus the 30+ min precompute step. GitHub App tokens expire after 60 minutes.
      - name: Refresh app token
        if: always() && steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true'
        id: refreshed-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Push verified repair
        if: steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip' && steps.assess.outputs.result == 'pushable'
        id: push
        env:
          GH_TOKEN: ${{ steps.refreshed-app-token.outputs.token }}
        run: |
          python3 scripts/workflows/workflow_git.py configure \
            --repo "${{ github.repository }}" \
            --unset-extraheader
          git push origin HEAD:${{ steps.pr.outputs.head_branch }} --force
          python3 scripts/workflows/workflow_git.py promote \
            --repo "${{ github.repository }}" \
            --branch "${{ steps.pr.outputs.head_branch }}" \
            --message "Repair PR #${{ steps.pr.outputs.number }}: auto-repair (${{ steps.repair.outputs.backend }})" \
            >> "$GITHUB_OUTPUT"

      - name: Comment repair result
        if: always() && steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        env:
          GH_TOKEN: ${{ steps.refreshed-app-token.outputs.token }}
        run: |
          RESULT="${{ steps.assess.outputs.result }}"

          # Append agent findings to the comment file so knowledge is not lost
          # when the agent investigates but fails to produce a fix.
          append_agent_findings() {
            if [ ! -s "$AGENT_RESULT_FILE" ]; then
              return
            fi
            FINDINGS=$(jq -r '.result // ""' "$AGENT_RESULT_FILE" 2>/dev/null | head -40)
            if [ -z "$FINDINGS" ]; then
              return
            fi
            {
              echo ""
              echo "<details>"
              echo "<summary>Agent findings (what was tried)</summary>"
              echo ""
              echo '```'
              echo "$FINDINGS"
              echo '```'
              echo "</details>"
            } >> "$REPAIR_COMMENT_FILE"
          }

          if [ "$RESULT" = "pushable" ] && [ "${{ steps.push.outcome }}" = "success" ]; then
            {
              echo "## Auto-repair Succeeded"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Model: \`${{ steps.backend.outputs.model_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo "- Repair commit: \`${{ steps.push.outputs.signed_sha || steps.assess.outputs.head_sha }}\`"
              echo ""
              echo "Auto-repair succeeded with backend \`${{ steps.backend.outputs.display_label }}\`."
              echo ""
              echo "Validated locally before push using \`${REPAIR_VERIFY_SCRIPT}\`."
              echo ""
              echo "<!-- nitrocop-auto-repair: phase=pushed head_sha=${{ steps.pr.outputs.head_sha }} backend=${{ steps.repair.outputs.backend }} checks_run_id=${{ steps.target.outputs.checks_run_id }} repair_commit=${{ steps.push.outputs.signed_sha || steps.assess.outputs.head_sha }} -->"
            } > "$REPAIR_COMMENT_FILE"
          elif [ "$RESULT" = "no_changes" ]; then
            {
              echo "## Auto-repair Did Not Produce a Fix"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "The repair attempt completed local verification commands but produced no branch changes, so it was treated as unsuccessful."
            } > "$REPAIR_COMMENT_FILE"
          elif [ "$RESULT" = "empty_pr" ]; then
            {
              echo "## Auto-repair Rejected"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "The repair would have reduced the PR to an empty diff against \`origin/main\`, which this workflow treats as an invalid blanket revert."
            } > "$REPAIR_COMMENT_FILE"
          elif [ "$RESULT" = "stale_pr" ]; then
            echo "::notice::Skipping auto-repair result publish: ${{ steps.live_pr.outputs.skip_reason }}"
            exit 0
          elif [ "$RESULT" = "file_guard_failed" ]; then
            {
              echo "## Auto-repair Rejected"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "The workflow rejected this repair because it edited files outside the allowed scope for route \`${{ steps.repair.outputs.guard_profile }}\`."
              echo ""
              cat "$AGENT_SCOPE_REPORT_FILE"
            } > "$REPAIR_COMMENT_FILE"
          elif [ "$RESULT" = "agent_failed" ]; then
            {
              echo "## Auto-repair Agent Failed"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "The repair agent step failed before local verification ran."
            } > "$REPAIR_COMMENT_FILE"
          elif [ "$RESULT" = "verify_not_run" ]; then
            {
              echo "## Auto-repair Verification Did Not Run"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "The workflow reached assessment without a verification result, so no verification log was produced."
            } > "$REPAIR_COMMENT_FILE"
          elif [ "${{ steps.push.outcome }}" = "failure" ]; then
            {
              echo "## Auto-repair Push Failed"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "Local verification passed, but pushing the repair branch failed."
            } > "$REPAIR_COMMENT_FILE"
          else
            {
              echo "## Auto-repair Failed Verification"
              echo ""
              echo "- Checks run: [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
              echo "- Backend: \`${{ steps.backend.outputs.display_label }}\`"
              echo "- Repair workflow: [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              echo ""
              echo "Auto-repair failed local verification with backend \`${{ steps.backend.outputs.display_label }}\`."
              echo ""
              echo "Reason: ${{ steps.repair.outputs.reason }}"
              echo ""
              echo "<details>"
              echo "<summary>Verification tail</summary>"
              echo ""
              echo '```'
              tail -40 "$REPAIR_VERIFY_LOG" 2>/dev/null || echo "(no verification log)"
              echo '```'
              echo "</details>"
            } > "$REPAIR_COMMENT_FILE"
          fi
          # For non-success outcomes, append agent findings so the knowledge
          # of what was tried is preserved in the PR/issue comment.
          if ! { [ "$RESULT" = "pushable" ] && [ "${{ steps.push.outcome }}" = "success" ]; }; then
            append_agent_findings
          fi
          gh pr comment "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --body-file "$REPAIR_COMMENT_FILE"
          if [ -n "${{ steps.pr.outputs.linked_issue_number }}" ] && ! { [ "$RESULT" = "pushable" ] && [ "${{ steps.push.outcome }}" = "success" ]; }; then
            gh issue comment "${{ steps.pr.outputs.linked_issue_number }}" --repo "${{ github.repository }}" --body-file "$REPAIR_COMMENT_FILE"
            gh issue edit "${{ steps.pr.outputs.linked_issue_number }}" --repo "${{ github.repository }}" \
              --remove-label "state:pr-open,state:backlog" \
              --add-label "state:blocked" 2>/dev/null || true
          fi

      - name: Generate repair summary
        if: always() && steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        run: |
          OUTCOME="${{ steps.assess.outputs.result }}"
          PUSH_OUTCOME="${{ steps.push.outcome }}"
          if [ "$OUTCOME" = "pushable" ] && [ "$PUSH_OUTCOME" = "success" ]; then
            FINAL_OUTCOME="pushed"
          elif [ -n "$OUTCOME" ]; then
            FINAL_OUTCOME="$OUTCOME"
          else
            FINAL_OUTCOME="unknown"
          fi

          {
            echo "# Agent PR Repair: PR #${{ steps.pr.outputs.number }}"
            echo ""
            echo "**Checks run:** [#${{ steps.target.outputs.checks_run_id }}](${{ steps.target.outputs.checks_url }})"
            echo "**Route:** \`${{ steps.repair.outputs.route }}\` | **Backend:** \`${{ steps.backend.outputs.display_label || steps.repair.outputs.backend }}\` | **Outcome:** \`$FINAL_OUTCOME\`"
            echo "**Workflow:** [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            echo "## Result"
            echo ""
            if [ -s "$AGENT_RESULT_FILE" ]; then
              COST=$(jq -r '.total_cost_usd // "?"' "$AGENT_RESULT_FILE" 2>/dev/null)
              TURNS=$(jq -r '.num_turns // "?"' "$AGENT_RESULT_FILE" 2>/dev/null)
              RESULT=$(jq -r '.result // "no result"' "$AGENT_RESULT_FILE" 2>/dev/null)
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Cost | \$$COST |"
              echo "| Turns | $TURNS |"
              echo ""
              echo "### Agent Output"
              echo ""
              echo '```'
              echo "$RESULT" | head -50
              echo '```'
            else
              echo "No agent-result.json found."
            fi
            echo ""

            echo "## Verification"
            echo ""
            echo '```'
            if [ -f "$REPAIR_VERIFY_LOG" ]; then
              tail -60 "$REPAIR_VERIFY_LOG"
            else
              echo "(verification did not run)"
            fi
            echo '```'
            echo ""

            echo "## Agent Changes"
            echo ""
            if [ -s "$AGENT_RECOVERY_STAT_FILE" ]; then
              echo '```'
              cat "$AGENT_RECOVERY_STAT_FILE"
              echo '```'
            else
              echo "No agent changes captured."
            fi
            echo ""

            if [ -s "$AGENT_SCOPE_REPORT_FILE" ]; then
              echo "## File Scope"
              echo ""
              cat "$AGENT_SCOPE_REPORT_FILE"
              echo ""
            fi

            if [ -s "$FINAL_PR_DIFF_STAT_FILE" ]; then
              echo "## Final PR Diff"
              echo ""
              echo '```'
              cat "$FINAL_PR_DIFF_STAT_FILE"
              echo '```'
              echo ""
            fi

            if [ -s "$AGENT_GIT_ACTIVITY_DIR/report.md" ]; then
              echo "<details>"
              echo "<summary>Additional git activity</summary>"
              echo ""
              cat "$AGENT_GIT_ACTIVITY_DIR/report.md"
              echo ""
              echo "</details>"
              echo ""
            fi

            LOGFILE=$(cat "$AGENT_LOGFILE_POINTER_FILE" 2>/dev/null || true)
            if [ -n "$LOGFILE" ] && [ -f "$LOGFILE" ]; then
              echo "## Agent Conversation"
              echo ""
              python3 scripts/workflows/agent_logs.py extract "$LOGFILE" --max-lines 120 2>/dev/null || true
              echo ""
            fi

            if [ -s "$FINAL_PR_DIFF_FILE" ]; then
              echo "<details>"
              echo "<summary>Final PR diff (first 200 lines)</summary>"
              echo ""
              echo '```diff'
              head -200 "$FINAL_PR_DIFF_FILE"
              echo '```'
              echo "</details>"
            fi
          } > "$REPAIR_SUMMARY_FILE"

          cat "$REPAIR_SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent artifacts
        if: always() && steps.pr.outputs.should_run == 'true' && steps.policy.outputs.should_repair == 'true' && steps.repair.outputs.route != 'skip'
        uses: ./.github/actions/upload-agent-artifacts
        with:
          base_sha: ${{ steps.prep.outputs.base_sha }}
          workflow: agent-pr-repair
          artifact_name: agent-pr-repair-${{ github.run_id }}-${{ github.run_attempt }}
          anthropic_auth_token: ${{ secrets.MINIMAX_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          actions_read_token: ${{ steps.actions-read-token.outputs.token }}

  # Reset linked tracker issue when a bot PR is closed without merging.
  # This handles both manual closes and programmatic closes that bypass
  # the cop_fix_lifecycle.py finalize step.
  reset-issue:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == false &&
      startsWith(github.event.pull_request.head.ref, 'fix/')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/workflows/cop_fix_lifecycle.py
            scripts/shared
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Reset linked tracker issue to backlog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --json body -q '.body')
          # Extract linked issue number from PR body marker
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?<=nitrocop-cop-issue:\s)\S+' | grep -oP 'issue=\K\d+' || true)
          if [ -z "$ISSUE_NUM" ]; then
            echo "::notice::No linked tracker issue found in PR body"
            exit 0
          fi
          # Only reset if issue is currently in pr-open state
          LABELS=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" \
            --json labels -q '[.labels[].name] | join(",")')
          if echo "$LABELS" | grep -q "state:pr-open"; then
            gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" \
              --remove-label "state:pr-open" --add-label "state:backlog"
            echo "::notice::Reset issue #$ISSUE_NUM to state:backlog"
          else
            echo "::notice::Issue #$ISSUE_NUM not in pr-open state (labels: $LABELS), skipping reset"
          fi
