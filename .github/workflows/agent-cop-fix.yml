name: Agent Cop Fix

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string
      model:
        description: 'Model profile: minimax (cheap, Tier 1), claude-sonnet (Tier 2), claude-opus (Tier 3)'
        type: choice
        options:
          - minimax
          - claude-sonnet
          - claude-opus
        default: minimax

jobs:
  # Build the target/ cache on GHA (has Rust cache, fast incremental)
  # and upload as a release asset so Kilo can download without auth.
  build-cache:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo test --lib --no-run 2>&1

      - name: Package build cache
        run: |
          # Tar just the essential build artifacts (not the full target/)
          # Include deps + incremental + the test binary
          tar czf /tmp/agent-build-cache.tar.gz \
            -C target/debug \
            deps/ \
            build/ \
            incremental/ \
            .fingerprint/ \
            $(cd target/debug && ls nitrocop-* 2>/dev/null || true)
          ls -lh /tmp/agent-build-cache.tar.gz

      - name: Upload build cache to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="agent-build-cache"
          # Create or update the release
          gh release view "$TAG" &>/dev/null || \
            gh release create "$TAG" --title "Agent Build Cache" \
              --notes "Pre-built target/debug cache for Kilo agents. Auto-updated." \
              --prerelease
          # Upload (overwrite if exists)
          gh release upload "$TAG" /tmp/agent-build-cache.tar.gz --clobber

  dispatch:
    needs: build-cache
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compute branch name
        id: branch
        run: |
          BRANCH=$(python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          print(f'fix/{dept_dir}-{snake(name)}')
          " "${{ github.event.inputs.cop }}")
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH"

      - name: Generate task packet
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/generate-cop-task.py \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --output /tmp/task.md
          echo "Generated task packet for ${{ github.event.inputs.cop }}"
          wc -l /tmp/task.md

      - name: Prepare agent branch
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"

      - name: Dispatch to Kilo
        env:
          KILO_WEBHOOK_SECRET: ${{ secrets.KILO_WEBHOOK_SECRET }}
          KILO_WEBHOOK_MINIMAX: ${{ secrets.KILO_WEBHOOK_MINIMAX }}
          KILO_WEBHOOK_CLAUDE_SONNET: ${{ secrets.KILO_WEBHOOK_CLAUDE_SONNET }}
          KILO_WEBHOOK_CLAUDE_OPUS: ${{ secrets.KILO_WEBHOOK_CLAUDE_OPUS }}
        run: |
          MODEL="${{ github.event.inputs.model }}"
          case "$MODEL" in
            minimax)        WEBHOOK_URL="$KILO_WEBHOOK_MINIMAX" ;;
            claude-sonnet)  WEBHOOK_URL="$KILO_WEBHOOK_CLAUDE_SONNET" ;;
            claude-opus)    WEBHOOK_URL="$KILO_WEBHOOK_CLAUDE_OPUS" ;;
          esac

          python3 scripts/agent/kilo_dispatch.py \
            --task /tmp/task.md \
            --cop "${{ github.event.inputs.cop }}" \
            --webhook-url "$WEBHOOK_URL" \
            --branch "${{ steps.branch.outputs.name }}"
