name: Agent Cop Fix

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string
      backend:
        description: 'Agent backend'
        type: choice
        options:
          - minimax
          - codex
        default: minimax
      mode:
        description: 'Mode: fix (fresh) or retry (with prior attempt context)'
        type: choice
        options:
          - fix
          - retry
        default: fix
      extra_context:
        description: 'Additional instructions for the agent (optional)'
        required: false
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      # --- Rust toolchain + cache ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      # On self-hosted: copy pre-warmed target into job workspace (each job
      # gets its own copy to avoid concurrent cargo lock contention)
      # On GitHub-hosted: use actions/cache to save/restore target/
      - name: Set up cargo cache
        run: |
          if [ -d "/home/runner/cargo-target-seed" ]; then
            echo "Self-hosted runner — seeding target/ from pre-warmed cache"
            cp -al /home/runner/cargo-target-seed target 2>/dev/null || \
              cp -r /home/runner/cargo-target-seed target
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          fi
        id: cargo-cache

      - uses: actions/cache@v4
        if: steps.cargo-cache.outputs.seeded != 'true'
        with:
          path: target
          key: agent-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: agent-target-

      # --- Fast steps ---

      - name: Compute identifiers
        id: cop
        run: |
          MODE="${{ github.event.inputs.mode }}"
          echo "::notice::${MODE^} cop: ${{ github.event.inputs.cop }} (backend: ${{ github.event.inputs.backend }})"
          python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          cop_snake = snake(name)
          print(f'branch_prefix=fix/{dept_dir}-{cop_snake}')
          print(f'branch=fix/{dept_dir}-{cop_snake}-${{ github.run_id }}')
          print(f'filter=cop::{dept_dir}::{cop_snake}')
          " "${{ github.event.inputs.cop }}" >> "$GITHUB_OUTPUT"

      # --- App token (needed for push + PR creation as 6[bot]) ---
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # --- Dedup guard + claim PR upfront ---
      - name: Create draft PR (claim)
        id: claim
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COP="${{ github.event.inputs.cop }}"
          MODE="${{ github.event.inputs.mode }}"
          BACKEND="${{ github.event.inputs.backend }}"
          BRANCH="${{ steps.cop.outputs.branch }}"
          RETRY_NOTE=""
          if [ "$MODE" = "retry" ]; then RETRY_NOTE=" (retry)"; fi

          # Check for existing open PR
          EXISTING=$(gh pr list --state open --search "[bot] Fix ${COP} in:title" --json number,title --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "::error::Skipping ${COP} — PR #${EXISTING} already open"
            exit 1
          fi

          # Create empty branch via API (signed commit)
          REPO="${{ github.repository }}"
          PARENT_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          TREE_SHA=$(gh api "repos/${REPO}/git/commits/${PARENT_SHA}" --jq '.tree.sha')
          COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
            -f message="[bot] Fix ${COP}: in progress [skip ci]" \
            -f tree="$TREE_SHA" \
            -f "parents[]=$PARENT_SHA" \
            --jq '.sha')
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="$COMMIT_SHA"

          MODEL_LABEL="model:${BACKEND}"
          gh label create agent-fix --color "0e8a16" 2>/dev/null || true
          gh label create "$MODEL_LABEL" --color "c2e0c6" 2>/dev/null || true

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          printf -v DRAFT_BODY '> **Status:** Agent is working on this fix...\n>\n> **Cop:** `%s` | **Backend:** %s | **Mode:** %s\n> **Run:** %s' "$COP" "$BACKEND" "$MODE" "$RUN_URL"
          PR_URL=$(gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --label "agent-fix,${MODEL_LABEL}" \
            --title "[bot] Fix ${COP}${RETRY_NOTE}" \
            --body "$DRAFT_BODY")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created draft PR: $PR_URL"

      # --- Build (before task generation for pre-diagnostic) ---

      # mold linker: cuts relink time from 30-60s to 2-5s for incremental builds
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

      - name: Build binary
        run: |
          cargo build 2>&1
          CARGO_INCREMENTAL=1 cargo test --lib --no-run 2>&1

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/generate-cop-task.py \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --binary target/debug/nitrocop \
            --output /tmp/task.md
          echo "=== Task prompt stats ==="
          wc -l /tmp/task.md
          grep -c "CODE BUG\|CONFIG/CONTEXT\|CONFIRMED\|NOT REPRODUCED" /tmp/task.md || echo "no diagnostics"

          # Count code bugs vs config issues from pre-diagnostic
          CODE_BUGS=$(grep -c "CODE BUG" /tmp/task.md || echo "0")
          CONFIG_ISSUES=$(grep -c "CONFIG/CONTEXT" /tmp/task.md || echo "0")
          echo "code_bugs=$CODE_BUGS" >> "$GITHUB_OUTPUT"
          echo "Code bugs: $CODE_BUGS, Config issues: $CONFIG_ISSUES"

          # Count tokens
          pip install -q tiktoken
          TOKENS=$(python3 scripts/ci/count_tokens.py /tmp/task.md 2>/dev/null || echo "?")
          echo "tokens=$TOKENS" >> "$GITHUB_OUTPUT"
          echo "Tokens: $TOKENS"
        id: task

      # --- Retry-only: collect prior attempts ---

      - name: Collect prior attempts
        if: github.event.inputs.mode == 'retry' && steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/collect_prior_attempts.py \
            --cop "${{ github.event.inputs.cop }}" \
            --output /tmp/prior_attempts.md

      - name: Close prior open PRs
        if: github.event.inputs.mode == 'retry' && steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_PREFIX="${{ steps.cop.outputs.branch_prefix }}"
          # Match on branch prefix (fix/dept-cop_name-*) not title search
          OPEN_PRS=$(gh pr list --state open --head "$BRANCH_PREFIX" --json number --jq '.[].number' 2>/dev/null || true)
          if [ -z "$OPEN_PRS" ]; then
            # Fallback: search by branch prefix pattern for older runs
            OPEN_PRS=$(gh pr list --state open --json number,headRefName --jq ".[] | select(.headRefName | startswith(\"$BRANCH_PREFIX\")) | .number" 2>/dev/null || true)
          fi
          for pr in $OPEN_PRS; do
            echo "Closing stale PR #$pr"
            gh pr close "$pr" --comment "Superseded by retry attempt." 2>/dev/null || true
          done

      # --- Build final prompt (combines task + retry context + extra instructions) ---

      - name: Build final prompt
        if: steps.task.outputs.code_bugs != '0'
        run: |
          cp /tmp/task.md /tmp/final-task.md

          if [ -s /tmp/prior_attempts.md 2>/dev/null ]; then
            echo "" >> /tmp/final-task.md
            cat /tmp/prior_attempts.md >> /tmp/final-task.md
          fi

          if [ -n "${{ github.event.inputs.extra_context }}" ]; then
            echo "" >> /tmp/final-task.md
            echo "## Additional Instructions" >> /tmp/final-task.md
            echo "${{ github.event.inputs.extra_context }}" >> /tmp/final-task.md
          fi

          if [ "${{ github.event.inputs.mode }}" = "retry" ]; then
            echo "" >> /tmp/final-task.md
            echo "**CRITICAL:** Do NOT repeat approaches that already failed. Read the prior attempts carefully and try a DIFFERENT strategy." >> /tmp/final-task.md
          fi

          echo "=== Final prompt ==="
          wc -l /tmp/final-task.md

      - name: Update PR with task prompt
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ github.event.inputs.backend }}"
          MODE="${{ github.event.inputs.mode }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_URL="${{ steps.claim.outputs.pr_url }}"
          CODE_BUGS="${{ steps.task.outputs.code_bugs }}"

          TOKENS="${{ steps.task.outputs.tokens }}"

          {
            echo "> **Status:** Agent is working on this fix..."
            echo ">"
            echo "> **Cop:** \`${COP}\` | **Backend:** ${BACKEND} | **Mode:** ${MODE}"
            echo "> **Code bugs:** ${CODE_BUGS} | **Run:** ${RUN_URL}"
            echo ""
            echo "<details>"
            echo "<summary>Task prompt (${TOKENS} tokens)</summary>"
            echo ""
            cat /tmp/task.md
            echo ""
            echo "</details>"
          } > /tmp/claim-body.md

          gh pr edit "$PR_URL" --body-file /tmp/claim-body.md

      - name: Skip if already fixed
        if: steps.task.outputs.code_bugs == '0'
        run: |
          echo "::warning::No code bugs found — cop appears already fixed. Skipping agent."
          echo "All FP/FN examples are config/context issues or already detected."

      - name: Install Ruby (for agent debugging)
        if: steps.task.outputs.code_bugs != '0'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: false

      - name: Install Ruby gems (for agent debugging)
        if: steps.task.outputs.code_bugs != '0'
        run: |
          # Read versions from vendor submodule tags to stay in sync
          V_RC=$(cd vendor/rubocop && git describe --tags --abbrev=0 | sed 's/^v//')
          V_PERF=$(cd vendor/rubocop-performance && git describe --tags --abbrev=0 | sed 's/^v//')
          V_RAILS=$(cd vendor/rubocop-rails && git describe --tags --abbrev=0 | sed 's/^v//')
          V_RSPEC=$(cd vendor/rubocop-rspec && git describe --tags --abbrev=0 | sed 's/^v//')
          gem install "rubocop:$V_RC" "rubocop-performance:$V_PERF" \
            "rubocop-rails:$V_RAILS" "rubocop-rspec:$V_RSPEC" prism --no-document

      - name: Prepare clean workspace for agent
        if: steps.task.outputs.code_bugs != '0'
        run: |
          git config user.name "6[bot]"
          git config user.email "129682364+6[bot]@users.noreply.github.com"
          echo "main_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          # Preserve CI scripts before cleanup
          cp -r scripts/ci /tmp/ci-scripts
          # Replace full CLAUDE.md/AGENTS.md with minimal agent reference
          cp AGENTS.minimal.md CLAUDE.md
          cp AGENTS.minimal.md AGENTS.md
          git rm -r --quiet \
            AGENTS.minimal.md \
            .claude/ .agents/ .devcontainer/ .github/ gem/ scripts/ \
            2>/dev/null || true
          git add CLAUDE.md AGENTS.md
          git commit -m "tmp: clean workspace for agent"
        id: prep

      # --- Install + run agent ---

      - name: Install agent CLI
        if: steps.task.outputs.code_bugs != '0'
        run: |
          if [ "${{ github.event.inputs.backend }}" = "minimax" ]; then
            curl -fsSL https://claude.ai/install.sh | bash
          else
            npm install -g @openai/codex@latest
          fi

      - name: Run agent
        if: steps.task.outputs.code_bugs != '0'
        timeout-minutes: 45
        env:
          ANTHROPIC_BASE_URL: ${{ github.event.inputs.backend == 'minimax' && 'https://api.minimax.io/anthropic' || '' }}
          ANTHROPIC_AUTH_TOKEN: ${{ github.event.inputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_MODEL: ${{ github.event.inputs.backend == 'minimax' && 'MiniMax-M2.7' || '' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ github.event.inputs.backend == 'minimax' && 'MiniMax-M2.7' || '' }}
          API_TIMEOUT_MS: "300000"
          CARGO_INCREMENTAL: "1"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CODEX_AUTH_JSON: ${{ github.event.inputs.backend == 'codex' && secrets.CODEX_AUTH_JSON || '' }}
        run: |
          # Background progress watcher — shows what the agent is doing every 30s
          python3 /tmp/ci-scripts/watch_agent_progress.py \
            --newer-than /tmp/final-task.md --interval 30 &
          WATCHER_PID=$!

          if [ "${{ github.event.inputs.backend }}" = "minimax" ]; then
            claude -p --dangerously-skip-permissions \
              --output-format json \
              "$(cat /tmp/final-task.md)" \
              > /tmp/agent-result.json \
              2> >(tee /tmp/agent.log >&2) || true
          else
            mkdir -p ~/.codex
            echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json
            codex exec --full-auto -m gpt-5.4 -c model_reasoning_effort=xhigh - < /tmp/final-task.md \
              > /tmp/agent-result.json \
              2> >(tee /tmp/agent.log >&2) || true
          fi

          kill $WATCHER_PID 2>/dev/null || true

          # Show summary
          echo "=== Agent Summary ==="
          echo "Cost: $(jq -r '.total_cost_usd // "?"' /tmp/agent-result.json 2>/dev/null)"
          echo "Turns: $(jq -r '.num_turns // "?"' /tmp/agent-result.json 2>/dev/null)"
          echo "Result: $(jq -r '.result // "no result"' /tmp/agent-result.json 2>/dev/null | head -20)"

      - name: Generate summary
        if: always() && steps.task.outputs.code_bugs != '0'
        run: |
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ github.event.inputs.backend }}"
          MODE="${{ github.event.inputs.mode }}"

          {
            echo "# Agent Cop ${MODE^}: ${COP}"
            echo ""
            echo "**Backend:** ${BACKEND} | **Mode:** ${MODE}"
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            # Agent result summary
            if [ -s /tmp/agent-result.json ]; then
              COST=$(jq -r '.total_cost_usd // "?"' /tmp/agent-result.json 2>/dev/null)
              TURNS=$(jq -r '.num_turns // "?"' /tmp/agent-result.json 2>/dev/null)
              RESULT=$(jq -r '.result // "no result"' /tmp/agent-result.json 2>/dev/null)
              echo "## Result"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Cost | \$${COST} |"
              echo "| Turns | ${TURNS} |"
              echo ""
              echo "### Agent Output"
              echo ""
              echo '```'
              echo "${RESULT}" | head -50
              echo '```'
            else
              echo "## Result"
              echo ""
              echo "No agent result (agent-result.json is empty or missing)."
            fi
            echo ""

            # Changes summary
            echo "## Changes"
            echo ""
            if git diff --stat HEAD~1 2>/dev/null | grep -q '.'; then
              echo '```'
              git diff --stat HEAD~1 2>/dev/null || echo "(no git diff available)"
              echo '```'
            else
              echo "No file changes detected."
            fi
            echo ""

            # Task prompt excerpt
            echo "## Task Prompt (first 30 lines)"
            echo ""
            echo '```markdown'
            head -30 /tmp/task.md 2>/dev/null || echo "(task.md not found)"
            echo '```'
            echo ""

            # Pre-diagnostic results
            DIAG=$(grep -A 50 "## Pre-diagnostic Results" /tmp/task.md 2>/dev/null | head -50)
            if [ -n "$DIAG" ]; then
              echo "## Pre-diagnostic Results"
              echo ""
              echo "$DIAG" | tail -n +2
              echo ""
            fi

            # Agent conversation log (extracted from JSONL)
            LOGFILE=$(find ~/.claude/projects -name '*.jsonl' -newer /tmp/final-task.md 2>/dev/null | head -1)
            if [ -n "$LOGFILE" ]; then
              echo "## Agent Conversation"
              echo ""
              python3 /tmp/ci-scripts/extract_agent_log.py "$LOGFILE" 2>/dev/null || true
              echo ""
            fi

            # Agent stderr log tail
            if [ -s /tmp/agent.log ]; then
              echo "<details>"
              echo "<summary>Agent stderr (last 30 lines)</summary>"
              echo ""
              echo '```'
              tail -30 /tmp/agent.log
              echo '```'
              echo "</details>"
            fi
          } > /tmp/summary.md

          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent log
        if: always() && steps.task.outputs.code_bugs != '0'
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/agent.log
            /tmp/agent-result.json
            /tmp/task.md
            /tmp/final-task.md
            /tmp/summary.md
            ~/.claude/projects/**/*.jsonl
          retention-days: 7

      # --- Validate + PR ---

      - name: Check for changes
        if: steps.task.outputs.code_bugs != '0'
        id: changes
        run: |
          UNCOMMITTED=false
          NEW_COMMITS=false
          if ! git diff --quiet; then
            UNCOMMITTED=true
          fi
          CLEANUP_SHA=$(git log --format=%H -1 --grep="tmp: clean workspace")
          if [ "$(git rev-parse HEAD)" != "$CLEANUP_SHA" ]; then
            NEW_COMMITS=true
          fi

          if [ "$UNCOMMITTED" = "true" ] || [ "$NEW_COMMITS" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected (uncommitted=$UNCOMMITTED, new_commits=$NEW_COMMITS)"
            git log --oneline "$CLEANUP_SHA"..HEAD 2>/dev/null || true
            git diff --stat 2>/dev/null || true
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes made"
          fi

      - name: Push to PR and mark ready
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          BRANCH="${{ steps.cop.outputs.branch }}"
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ github.event.inputs.backend }}"
          MODE="${{ github.event.inputs.mode }}"
          PR_URL="${{ steps.claim.outputs.pr_url }}"

          # Commit any uncommitted changes
          git add -A
          git commit -m "agent changes" --allow-empty

          # Extract changes to allowed paths
          git diff "${{ steps.prep.outputs.main_sha }}" HEAD -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > /tmp/agent.patch

          # Branch from the draft PR branch
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          if [ ! -s /tmp/agent.patch ]; then
            echo "No cop file changes found in agent output"
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            # Close the draft PR — agent produced nothing
            gh pr close "$PR_URL" --comment "Agent produced no changes." --delete-branch
            exit 0
          fi

          if git apply --3way /tmp/agent.patch; then
            echo "Patch applied cleanly"
          else
            echo "WARNING: patch had conflicts"
            git checkout --theirs -- . 2>/dev/null || true
            git add -A
            gh pr edit "$PR_URL" --add-label "needs-rebase"
          fi

          # Auto-format Rust files (agent often skips this)
          cargo fmt

          git add src/cop/ tests/fixtures/cops/ bench/corpus/

          RETRY_NOTE=""
          if [ "$MODE" = "retry" ]; then RETRY_NOTE=" (retry)"; fi
          git commit --allow-empty -m "Fix ${COP}: agent-generated fix${RETRY_NOTE} ($BACKEND)"

          # Push changes, then replace with signed commit via API
          git push origin "$BRANCH" --force

          REPO="${{ github.repository }}"
          UNSIGNED_SHA=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --jq '.object.sha')
          TREE_SHA=$(gh api "repos/${REPO}/git/commits/${UNSIGNED_SHA}" --jq '.tree.sha')
          PARENT_SHA=$(gh api "repos/${REPO}/git/commits/${UNSIGNED_SHA}" --jq '.parents[0].sha')
          SIGNED_SHA=$(gh api "repos/${REPO}/git/commits" \
            -f message="Fix ${COP}: agent-generated fix${RETRY_NOTE} (${BACKEND})" \
            -f tree="$TREE_SHA" \
            -f "parents[]=$PARENT_SHA" \
            --jq '.sha')
          gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
            -X PATCH -f sha="$SIGNED_SHA" -f force=true

          # Build final PR body with agent results
          TURNS=$(jq -r '.num_turns // "?"' /tmp/agent-result.json 2>/dev/null || echo "?")
          DIFF_STAT=$(git diff --stat "${PARENT_SHA}".."${SIGNED_SHA}" 2>/dev/null | tail -1 || echo "")
          if [ -z "$DIFF_STAT" ]; then
            DIFF_STAT=$(gh api "repos/${REPO}/compare/${PARENT_SHA}...${SIGNED_SHA}" --jq '"  \(.files | length) files changed"' 2>/dev/null || echo "")
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "Automated ${MODE} fix for \`${COP}\` corpus conformance."
            echo ""
            echo "## Details"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Cop** | \`${COP}\` |"
            echo "| **Backend** | ${BACKEND} |"
            echo "| **Mode** | ${MODE} |"
            echo "| **Turns** | ${TURNS} |"
            echo "| **Run** | [#${{ github.run_number }}](${RUN_URL}) |"
            echo ""
            echo "## Changes"
            echo ""
            echo '```'
            echo "${DIFF_STAT}"
            echo '```'
            echo ""
            echo "<details>"
            echo "<summary>Task prompt (${{ steps.task.outputs.tokens }} tokens)</summary>"
            echo ""
            cat /tmp/task.md
            echo ""
            echo "</details>"
          } > /tmp/pr-body.md

          gh pr edit "$PR_URL" --body-file /tmp/pr-body.md

          # Mark PR as ready for review (no longer draft)
          gh pr ready "$PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "PR ready: $PR_URL"

          # Enable auto-merge (squash).
          # PR will merge automatically once CI passes + review approval.
          gh pr merge "$PR_URL" --auto --rebase --delete-branch

      # --- Cleanup: close draft PR if agent failed ---
      - name: Close draft PR on failure
        if: failure() && steps.claim.outputs.pr_url
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr close "${{ steps.claim.outputs.pr_url }}" \
            --comment "Agent failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --delete-branch
