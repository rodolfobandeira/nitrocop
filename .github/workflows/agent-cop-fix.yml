name: Agent Cop Fix

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string
      backend:
        description: 'Backend family'
        type: choice
        options:
          - auto
          - codex
          - claude
          - minimax
        default: auto
      strength:
        description: 'Model strength (used when backend is not auto)'
        type: choice
        options:
          - auto
          - normal
          - hard
        default: auto
      mode:
        description: 'Mode: fix (fresh) or retry (with prior attempt context)'
        type: choice
        options:
          - fix
          - retry
        default: fix
      issue_number:
        description: 'Optional linked cop tracker issue number'
        required: false
        type: string
      extra_context:
        description: 'Additional instructions for the agent (optional)'
        required: false
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      # --- Rust toolchain + cache ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      # On self-hosted: copy pre-warmed target into job workspace (each job
      # gets its own copy to avoid concurrent cargo lock contention)
      # On GitHub-hosted: use actions/cache to save/restore target/
      - name: Set up cargo cache
        run: |
          if [ -d "/home/runner/cargo-target-seed" ]; then
            echo "Self-hosted runner — seeding target/ from pre-warmed cache"
            cp -al /home/runner/cargo-target-seed target 2>/dev/null || \
              cp -r /home/runner/cargo-target-seed target
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          fi
        id: cargo-cache

      - uses: actions/cache@v4
        if: steps.cargo-cache.outputs.seeded != 'true'
        with:
          path: target
          key: agent-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: agent-target-

      - name: Initialize runtime layout
        run: |
          python3 scripts/workflows/agent_runtime.py agent-cop-fix \
            --runner-temp "${RUNNER_TEMP}" >> "$GITHUB_ENV"

      # --- Fast steps ---

      - name: Compute identifiers
        id: cop
        run: |
          MODE="${{ github.event.inputs.mode }}"
          echo "::notice::${MODE^} cop: ${{ github.event.inputs.cop }} (backend input: ${{ github.event.inputs.backend }}, strength: ${{ github.event.inputs.strength }})"
          python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          cop_snake = snake(name)
          print(f'branch_prefix=fix/{dept_dir}-{cop_snake}')
          print(f'branch=fix/{dept_dir}-{cop_snake}-${{ github.run_id }}')
          print(f'filter=cop::{dept_dir}::{cop_snake}')
          " "${{ github.event.inputs.cop }}" >> "$GITHUB_OUTPUT"

      # --- App token (needed for push + PR creation as 6[bot]) ---
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Generate read-only GitHub token
        id: actions-read-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read
          permission-metadata: read
          permission-pull-requests: read

      # --- Build (before task generation for pre-diagnostic) ---

      # mold linker: cuts relink time from 30-60s to 2-5s for incremental builds
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

      - name: Build binary
        run: |
          cargo build 2>&1
          CARGO_INCREMENTAL=1 cargo test --lib --no-run 2>&1

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/dispatch-cops.py task \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --binary target/debug/nitrocop \
            --output "$TASK_FILE"
          echo "=== Task prompt stats ==="
          wc -l "$TASK_FILE"
          grep -c "CODE BUG\|CONFIG/CONTEXT\|CONFIRMED\|NOT REPRODUCED" "$TASK_FILE" || echo "no diagnostics"

          # Count code bugs vs config issues from pre-diagnostic
          CODE_BUGS=$(grep -c "CODE BUG" "$TASK_FILE" || echo "0")
          CONFIG_ISSUES=$(grep -c "CONFIG/CONTEXT" "$TASK_FILE" || echo "0")
          echo "code_bugs=$CODE_BUGS" >> "$GITHUB_OUTPUT"
          echo "Code bugs: $CODE_BUGS, Config issues: $CONFIG_ISSUES"

          # Count tokens
          python3 -m pip install -q tiktoken
          TOKENS=$(python3 scripts/workflows/count_tokens.py "$TASK_FILE")
          echo "tokens=$TOKENS" >> "$GITHUB_OUTPUT"
          echo "Tokens: $TOKENS"
        id: task

      # --- Retry-only: collect prior attempts ---

      - name: Collect prior attempts
        if: github.event.inputs.mode == 'retry' && steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/dispatch-cops.py prior-attempts \
            --cop "${{ github.event.inputs.cop }}" \
            --output "$PRIOR_ATTEMPTS_FILE"

      - name: Close prior open PRs
        if: github.event.inputs.mode == 'retry' && steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_PREFIX="${{ steps.cop.outputs.branch_prefix }}"
          # Match on branch prefix (fix/dept-cop_name-*) not title search
          OPEN_PRS=$(gh pr list --state open --head "$BRANCH_PREFIX" --json number --jq '.[].number' 2>/dev/null || true)
          if [ -z "$OPEN_PRS" ]; then
            # Fallback: search by branch prefix pattern for older runs
            OPEN_PRS=$(gh pr list --state open --json number,headRefName --jq ".[] | select(.headRefName | startswith(\"$BRANCH_PREFIX\")) | .number" 2>/dev/null || true)
          fi
          for pr in $OPEN_PRS; do
            echo "Closing stale PR #$pr"
            gh pr close "$pr" --comment "Superseded by retry attempt." 2>/dev/null || true
          done

      # --- Build final prompt (combines task + retry context + extra instructions) ---

      - name: Build final prompt
        if: steps.task.outputs.code_bugs != '0'
        run: |
          cp "$TASK_FILE" "$FINAL_TASK_FILE"

          if [ -s "$PRIOR_ATTEMPTS_FILE" 2>/dev/null ]; then
            echo "" >> "$FINAL_TASK_FILE"
            cat "$PRIOR_ATTEMPTS_FILE" >> "$FINAL_TASK_FILE"
          fi

          if [ -n "${{ github.event.inputs.extra_context }}" ]; then
            echo "" >> "$FINAL_TASK_FILE"
            echo "## Additional Instructions" >> "$FINAL_TASK_FILE"
            echo "${{ github.event.inputs.extra_context }}" >> "$FINAL_TASK_FILE"
          fi

          if [ "${{ github.event.inputs.mode }}" = "retry" ]; then
            echo "" >> "$FINAL_TASK_FILE"
            echo "**CRITICAL:** Do NOT repeat approaches that already failed. Read the prior attempts carefully and try a DIFFERENT strategy." >> "$FINAL_TASK_FILE"
          fi

          echo "=== Final prompt ==="
          wc -l "$FINAL_TASK_FILE"

      - name: Select backend
        if: steps.task.outputs.code_bugs != '0'
        id: selected_backend
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          INPUT_BACKEND="${{ github.event.inputs.backend }}"
          INPUT_STRENGTH="${{ github.event.inputs.strength }}"
          ISSUE_DIFFICULTY=""
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            ISSUE_LABELS=$(gh issue view "${{ github.event.inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$ISSUE_LABELS" | grep -qx 'difficulty:simple'; then
              ISSUE_DIFFICULTY="simple"
            elif echo "$ISSUE_LABELS" | grep -qx 'difficulty:medium'; then
              ISSUE_DIFFICULTY="medium"
            elif echo "$ISSUE_LABELS" | grep -qx 'difficulty:complex'; then
              ISSUE_DIFFICULTY="complex"
            fi
          fi
          if [ "$INPUT_BACKEND" = "auto" ]; then
            ARGS=(
              --repo "${{ github.repository }}"
              --cop "${{ github.event.inputs.cop }}"
              --mode "${{ github.event.inputs.mode }}"
              --extended
              --binary target/debug/nitrocop
            )
            if [ -n "$ISSUE_DIFFICULTY" ]; then
              ARGS+=(--issue-difficulty "$ISSUE_DIFFICULTY")
            fi
            python3 scripts/dispatch-cops.py backend \
              "${ARGS[@]}" \
              >> "$GITHUB_OUTPUT"
          else
            DEFAULT_STRENGTH="normal"
            if [ "${{ github.event.inputs.mode }}" = "retry" ] && [ "$INPUT_BACKEND" = "codex" ]; then
              DEFAULT_STRENGTH="hard"
            fi
            python3 scripts/workflows/resolve_backend.py choose \
              "$INPUT_BACKEND" \
              "$INPUT_STRENGTH" \
              "$DEFAULT_STRENGTH" \
              >> "$GITHUB_OUTPUT"
            echo "tier=3" >> "$GITHUB_OUTPUT"
            echo "code_bugs=0" >> "$GITHUB_OUTPUT"
            echo "config_issues=0" >> "$GITHUB_OUTPUT"
            echo "easy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve backend config
        if: steps.task.outputs.code_bugs != '0'
        id: backend
        run: |
          python3 scripts/workflows/resolve_backend.py "${{ steps.selected_backend.outputs.backend }}" \
            >> "$GITHUB_OUTPUT"

      - name: Create draft PR (claim)
        if: steps.task.outputs.code_bugs != '0'
        id: claim
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COP="${{ github.event.inputs.cop }}"
          MODE="${{ github.event.inputs.mode }}"
          BACKEND="${{ steps.selected_backend.outputs.backend }}"
          BACKEND_LABEL="${{ steps.selected_backend.outputs.display_label }}"
          MODEL_LABEL_TEXT="${{ steps.backend.outputs.model_label }}"
          BACKEND_REASON="${{ steps.selected_backend.outputs.reason }}"
          BRANCH="${{ steps.cop.outputs.branch }}"
          ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          RETRY_NOTE=""
          if [ "$MODE" = "retry" ]; then RETRY_NOTE=" (retry)"; fi

          EXISTING=$(gh pr list --state open --search "[bot] Fix ${COP} in:title" --json number,title,url --jq '.[0].url // empty')
          if [ -n "$EXISTING" ]; then
            echo "::error::Skipping ${COP} — PR already open: ${EXISTING}"
            exit 1
          fi

          REPO="${{ github.repository }}"
          PARENT_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          TREE_SHA=$(gh api "repos/${REPO}/git/commits/${PARENT_SHA}" --jq '.tree.sha')
          COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
            -f message="[bot] Fix ${COP}: in progress [skip ci]" \
            -f tree="$TREE_SHA" \
            -f "parents[]=$PARENT_SHA" \
            --jq '.sha')
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="$COMMIT_SHA"

          MODEL_LABEL="model:${BACKEND}"
          gh label create agent-fix --repo "${REPO}" --color "0e8a16" 2>/dev/null || true
          gh label create "$MODEL_LABEL" --repo "${REPO}" --color "c2e0c6" 2>/dev/null || true
          gh label create state:backlog --repo "${REPO}" --color "fbca04" 2>/dev/null || true
          gh label create state:pr-open --repo "${REPO}" --color "0e8a16" 2>/dev/null || true
          gh label create state:blocked --repo "${REPO}" --color "b60205" 2>/dev/null || true

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "> **Status:** Agent is working on this fix..."
            echo ">"
            echo "> **Cop:** \`${COP}\` | **Backend:** ${BACKEND_LABEL} | **Model:** ${MODEL_LABEL_TEXT} | **Mode:** ${MODE}"
            echo "> **Backend reason:** ${BACKEND_REASON}"
            echo "> **Run:** ${RUN_URL}"
            echo ""
            if [ -n "$ISSUE_NUMBER" ]; then
              echo "Closes #${ISSUE_NUMBER}"
              echo ""
              echo "<!-- nitrocop-cop-issue: number=${ISSUE_NUMBER} cop=${COP} -->"
              echo ""
            fi
          } > "$CLAIM_BODY_FILE"

          PR_URL=$(gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --label "agent-fix,${MODEL_LABEL}" \
            --title "[bot] Fix ${COP}${RETRY_NOTE}" \
            --body-file "$CLAIM_BODY_FILE")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created draft PR: $PR_URL"

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --repo "${REPO}" \
              --remove-label "state:backlog,state:blocked" \
              --add-label "state:pr-open" 2>/dev/null || true
          fi

      - name: Update PR with task prompt
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COP="${{ github.event.inputs.cop }}"
          BACKEND_LABEL="${{ steps.selected_backend.outputs.display_label }}"
          MODEL_LABEL_TEXT="${{ steps.backend.outputs.model_label }}"
          MODE="${{ github.event.inputs.mode }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_URL="${{ steps.claim.outputs.pr_url }}"
          CODE_BUGS="${{ steps.task.outputs.code_bugs }}"
          ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"

          TOKENS="${{ steps.task.outputs.tokens }}"

          {
            echo "> **Status:** Agent is working on this fix..."
            echo ">"
            echo "> **Cop:** \`${COP}\` | **Backend:** ${BACKEND_LABEL} | **Model:** ${MODEL_LABEL_TEXT} | **Mode:** ${MODE}"
            echo "> **Code bugs:** ${CODE_BUGS} | **Run:** ${RUN_URL}"
            echo ""
            if [ -n "$ISSUE_NUMBER" ]; then
              echo "Closes #${ISSUE_NUMBER}"
              echo ""
              echo "<!-- nitrocop-cop-issue: number=${ISSUE_NUMBER} cop=${COP} -->"
              echo ""
            fi
            echo "<details>"
            echo "<summary>Task prompt (${TOKENS} tokens)</summary>"
            echo ""
            cat "$TASK_FILE"
            echo ""
            echo "</details>"
          } > "$CLAIM_BODY_FILE"

          gh pr edit "$PR_URL" --body-file "$CLAIM_BODY_FILE"

      - name: Skip if already fixed
        if: steps.task.outputs.code_bugs == '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "::warning::No code bugs found — cop appears already fixed. Skipping agent."
          echo "All FP/FN examples are config/context issues or already detected."
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            cat > "$CLAIM_BODY_FILE" <<EOF
          No fix PR was created for \`${{ github.event.inputs.cop }}\`.

          Pre-diagnostic found no reproducible code bugs in the current corpus examples, so the workflow skipped agent execution.

          - Backend input: \`${{ github.event.inputs.backend }}\`
          - Mode: \`${{ github.event.inputs.mode }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
            gh issue comment "${{ github.event.inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --body-file "$CLAIM_BODY_FILE"
          fi

      - name: Install Ruby (for agent debugging)
        if: steps.task.outputs.code_bugs != '0'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: false

      - name: Install Ruby gems (for agent debugging)
        if: steps.task.outputs.code_bugs != '0'
        run: |
          # Read versions from vendor submodule tags to stay in sync
          V_RC=$(cd vendor/rubocop && git describe --tags --abbrev=0 | sed 's/^v//')
          V_PERF=$(cd vendor/rubocop-performance && git describe --tags --abbrev=0 | sed 's/^v//')
          V_RAILS=$(cd vendor/rubocop-rails && git describe --tags --abbrev=0 | sed 's/^v//')
          V_RSPEC=$(cd vendor/rubocop-rspec && git describe --tags --abbrev=0 | sed 's/^v//')
          gem install "rubocop:$V_RC" "rubocop-performance:$V_PERF" \
            "rubocop-rails:$V_RAILS" "rubocop-rspec:$V_RSPEC" prism --no-document

      - name: Pre-populate offense fixtures with FN corpus examples
        if: steps.task.outputs.code_bugs != '0'
        run: |
          COP="${{ github.event.inputs.cop }}"
          DEPT_DIR="${{ steps.cop.outputs.filter }}"
          # cop::dept::name -> tests/fixtures/cops/dept/name
          FIXTURE_DIR="tests/fixtures/cops/$(echo "$DEPT_DIR" | sed 's|cop::||;s|::|/|g')"
          python3 scripts/workflows/prepopulate_fixtures.py "$TASK_FILE" "$COP" "$FIXTURE_DIR"

      - name: Prepare clean workspace for agent
        if: steps.task.outputs.code_bugs != '0'
        run: |
          python3 scripts/workflows/workflow_git.py configure
          echo "main_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          python3 scripts/workflows/prepare_agent_workspace.py \
            --mode agent-cop-fix \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --preserve-ci-scripts "$CI_SCRIPTS_DIR"
        id: prep

      - name: Append available helper scripts to prompt
        if: steps.task.outputs.code_bugs != '0'
        run: |
          python3 "$CI_SCRIPTS_DIR/render_helper_scripts_section.py" >> "$FINAL_TASK_FILE"

      - name: Snapshot git state before agent
        if: steps.task.outputs.code_bugs != '0'
        run: |
          python3 "$CI_SCRIPTS_DIR/git_activity_snapshot.py" capture \
            --repo-root "$PWD" \
            --output "$GIT_ACTIVITY_BEFORE_FILE"

      # --- Install + run agent ---

      - name: Run backend setup
        if: steps.task.outputs.code_bugs != '0'
        env:
          MINIMAX_API_KEY: ${{ steps.selected_backend.outputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ (steps.selected_backend.outputs.backend == 'claude-normal' || steps.selected_backend.outputs.backend == 'claude-hard') && secrets.ANTHROPIC_API_KEY || '' }}
          CODEX_AUTH_JSON: ${{ (steps.selected_backend.outputs.backend == 'codex-normal' || steps.selected_backend.outputs.backend == 'codex-hard') && secrets.CODEX_AUTH_JSON || '' }}
        run: ${{ steps.backend.outputs.setup_cmd }}

      - name: Mask read-only GitHub token
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 "$CI_SCRIPTS_DIR/guard_backend_secrets.py" \
            --from-env GH_TOKEN_FOR_ACTIONS_READ \
            emit-masks

      - name: Run agent
        if: steps.task.outputs.code_bugs != '0'
        timeout-minutes: 45
        env:
          # Static env vars from resolve_backend (secrets injected separately)
          ANTHROPIC_BASE_URL: ${{ steps.backend.outputs.env_ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ steps.selected_backend.outputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ (steps.selected_backend.outputs.backend == 'claude-normal' || steps.selected_backend.outputs.backend == 'claude-hard') && secrets.ANTHROPIC_API_KEY || '' }}
          ANTHROPIC_MODEL: ${{ steps.backend.outputs.env_ANTHROPIC_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ steps.backend.outputs.env_ANTHROPIC_SMALL_FAST_MODEL }}
          API_TIMEOUT_MS: ${{ steps.backend.outputs.env_API_TIMEOUT_MS }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${{ steps.backend.outputs.env_CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC }}
          CARGO_INCREMENTAL: "1"
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          export PYTHONPATH="$PWD/scripts${PYTHONPATH:+:$PYTHONPATH}"

          # Background progress watcher
          python3 "$CI_SCRIPTS_DIR/agent_logs.py" watch \
            --newer-than "$FINAL_TASK_FILE" --interval 30 \
            --backend "${{ steps.backend.outputs.log_format }}" &
          WATCHER_PID=$!

          # Run the agent (command from resolve_backend)
          eval '${{ steps.backend.outputs.run_cmd }}'

          kill $WATCHER_PID 2>/dev/null || true

          # Show summary
          echo "=== Agent Summary ==="
          echo "Cost: $(jq -r '.total_cost_usd // "?"' "$AGENT_RESULT_FILE" 2>/dev/null)"
          echo "Turns: $(jq -r '.num_turns // "?"' "$AGENT_RESULT_FILE" 2>/dev/null)"
          echo "Result: $(jq -r '.result // "no result"' "$AGENT_RESULT_FILE" 2>/dev/null | head -20)"

      - name: Snapshot agent outputs
        if: always() && steps.task.outputs.code_bugs != '0'
        run: |
          git status --short > "$AGENT_STATUS_FILE" || true
          git log --oneline "${{ steps.prep.outputs.main_sha }}"..HEAD > "$AGENT_COMMITS_FILE" || true
          git diff --stat "${{ steps.prep.outputs.main_sha }}" -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > "$AGENT_RECOVERY_STAT_FILE" || true
          git diff "${{ steps.prep.outputs.main_sha }}" -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > "$AGENT_RECOVERY_DIFF_FILE" || true
          git diff --binary "${{ steps.prep.outputs.main_sha }}" -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > "$AGENT_RECOVERY_PATCH_FILE" || true
          python3 -c "
          import os, sys; sys.path.insert(0, os.environ['CI_SCRIPTS_DIR'])
          from agent_logs import find_logfile
          from pathlib import Path
          f = find_logfile(Path(os.environ['FINAL_TASK_FILE']), '${{ steps.backend.outputs.log_format }}')
          print(f or '')
          " > "$AGENT_LOGFILE_POINTER_FILE" 2>/dev/null || true
          python3 "$CI_SCRIPTS_DIR/git_activity_snapshot.py" capture \
            --repo-root "$PWD" \
            --output "$GIT_ACTIVITY_AFTER_FILE" || true
          python3 "$CI_SCRIPTS_DIR/git_activity_snapshot.py" report \
            --before "$GIT_ACTIVITY_BEFORE_FILE" \
            --after "$GIT_ACTIVITY_AFTER_FILE" \
            --out-dir "$AGENT_GIT_ACTIVITY_DIR" || true

      - name: Generate summary
        if: always() && steps.task.outputs.code_bugs != '0'
        run: |
          set +e
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ steps.selected_backend.outputs.backend }}"
          MODE="${{ github.event.inputs.mode }}"

          {
            echo "# Agent Cop ${MODE^}: ${COP}"
            echo ""
            echo "**Backend:** ${BACKEND} | **Mode:** ${MODE}"
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            # Agent result summary
            if [ -s "$AGENT_RESULT_FILE" ]; then
              COST=$(jq -r '.total_cost_usd // "?"' "$AGENT_RESULT_FILE" 2>/dev/null)
              TURNS=$(jq -r '.num_turns // "?"' "$AGENT_RESULT_FILE" 2>/dev/null)
              RESULT=$(jq -r '.result // "no result"' "$AGENT_RESULT_FILE" 2>/dev/null)
              echo "## Result"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Cost | \$${COST} |"
              echo "| Turns | ${TURNS} |"
              echo ""
              echo "### Agent Output"
              echo ""
              echo '```'
              echo "${RESULT}" | head -50
              echo '```'
            else
              echo "## Result"
              echo ""
              echo "No agent result (agent-result.json is empty or missing)."
            fi
            echo ""

            # Changes summary
            echo "## Changes"
            echo ""
            if [ -s "$AGENT_RECOVERY_STAT_FILE" ]; then
              echo '```'
              cat "$AGENT_RECOVERY_STAT_FILE"
              echo '```'
            else
              echo "No file changes detected."
            fi
            echo ""

            if [ -s "$AGENT_RECOVERY_DIFF_FILE" ]; then
              DIFF_LINES=$(wc -l < "$AGENT_RECOVERY_DIFF_FILE" 2>/dev/null || echo "0")
              echo "<details>"
              echo "<summary>Full diff</summary>"
              echo ""
              echo '```diff'
              sed -n '1,400p' "$AGENT_RECOVERY_DIFF_FILE"
              if [ "${DIFF_LINES}" -gt 400 ]; then
                echo ""
                echo "... diff truncated after 400 lines ..."
              fi
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ -s "$AGENT_GIT_ACTIVITY_DIR/report.md" ]; then
              echo "<details>"
              echo "<summary>Additional git activity</summary>"
              echo ""
              cat "$AGENT_GIT_ACTIVITY_DIR/report.md"
              echo ""
              echo "</details>"
              echo ""
            fi

            # Task prompt excerpt
            echo "## Task Prompt (first 30 lines)"
            echo ""
            echo '```markdown'
            head -30 "$TASK_FILE" 2>/dev/null || echo "(task.md not found)"
            echo '```'
            echo ""

            # Pre-diagnostic results
            DIAG=$(grep -A 50 "## Pre-diagnostic Results" "$TASK_FILE" 2>/dev/null | head -50 || true)
            if [ -n "$DIAG" ]; then
              echo "## Pre-diagnostic Results"
              echo ""
              echo "$DIAG" | tail -n +2
              echo ""
            fi

            # Agent conversation log (extracted from JSONL)
            LOGFILE=$(cat "$AGENT_LOGFILE_POINTER_FILE" 2>/dev/null || true)
            if [ -n "$LOGFILE" ]; then
              echo "## Agent Conversation"
              echo ""
              python3 "$CI_SCRIPTS_DIR/agent_logs.py" extract "$LOGFILE" 2>/dev/null || true
              echo ""
            fi

            # Agent stderr log tail
            if [ -s "$AGENT_LOG_FILE" ]; then
              echo "<details>"
              echo "<summary>Agent stderr (last 30 lines)</summary>"
              echo ""
              echo '```'
              tail -30 "$AGENT_LOG_FILE"
              echo '```'
              echo "</details>"
            fi
          } > "$SUMMARY_FILE"

      - name: Build artifact manifest
        if: always() && steps.task.outputs.code_bugs != '0'
        id: artifact_manifest
        run: |
          python3 "$CI_SCRIPTS_DIR/agent_artifacts.py" agent-cop-fix \
            --runtime-root "$AGENT_RUNTIME_ROOT" \
            --output "$AGENT_ARTIFACT_MANIFEST_FILE"
          {
            echo "paths<<EOF"
            cat "$AGENT_ARTIFACT_MANIFEST_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Scan generated files for backend secret leakage
        if: always() && steps.task.outputs.code_bugs != '0'
        id: leak_scan
        env:
          MINIMAX_API_KEY: ${{ steps.selected_backend.outputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ (steps.selected_backend.outputs.backend == 'claude-normal' || steps.selected_backend.outputs.backend == 'claude-hard') && secrets.ANTHROPIC_API_KEY || '' }}
          CODEX_AUTH_JSON: ${{ (steps.selected_backend.outputs.backend == 'codex-normal' || steps.selected_backend.outputs.backend == 'codex-hard') && secrets.CODEX_AUTH_JSON || '' }}
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 "$CI_SCRIPTS_DIR/guard_backend_secrets.py" \
            --ignore-missing \
            --from-env MINIMAX_API_KEY \
            --from-env ANTHROPIC_API_KEY \
            --from-env CODEX_AUTH_JSON \
            --from-env GH_TOKEN_FOR_ACTIONS_READ \
            scan-manifest \
            "$AGENT_ARTIFACT_MANIFEST_FILE"

      - name: Publish summary
        if: always() && steps.task.outputs.code_bugs != '0' && steps.leak_scan.outcome == 'success'
        run: |
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent log
        if: always() && steps.task.outputs.code_bugs != '0' && steps.leak_scan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.artifact_manifest.outputs.paths }}
          retention-days: 7

      # --- Validate + PR ---

      - name: Check for changes
        if: steps.task.outputs.code_bugs != '0'
        id: changes
        run: |
          UNCOMMITTED=false
          NEW_COMMITS=false
          if ! git diff --quiet; then
            UNCOMMITTED=true
          fi
          CLEANUP_SHA=$(git log --format=%H -1 --grep="tmp: clean workspace")
          if [ "$(git rev-parse HEAD)" != "$CLEANUP_SHA" ]; then
            NEW_COMMITS=true
          fi

          if [ "$UNCOMMITTED" = "true" ] || [ "$NEW_COMMITS" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected (uncommitted=$UNCOMMITTED, new_commits=$NEW_COMMITS)"
            git log --oneline "$CLEANUP_SHA"..HEAD 2>/dev/null || true
            git diff --stat 2>/dev/null || true
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes made"
          fi

      - name: Push to PR and mark ready
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 "$CI_SCRIPTS_DIR/workflow_git.py" configure \
            --repo "${{ github.repository }}" \
            --unset-extraheader

          BRANCH="${{ steps.cop.outputs.branch }}"
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ steps.selected_backend.outputs.backend }}"
          BACKEND_LABEL="${{ steps.selected_backend.outputs.display_label }}"
          MODEL_LABEL_TEXT="${{ steps.backend.outputs.model_label }}"
          MODE="${{ github.event.inputs.mode }}"
          PR_URL="${{ steps.claim.outputs.pr_url }}"
          ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          REPO="${{ github.repository }}"

          # Commit any uncommitted changes
          git add -A
          git commit -m "agent changes" --allow-empty

          # Extract changes to allowed paths
          git diff "${{ steps.prep.outputs.main_sha }}" HEAD -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > "$AGENT_PATCH_FILE"

          # Branch from the draft PR branch
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          if [ ! -s "$AGENT_PATCH_FILE" ]; then
            echo "No cop file changes found in agent output"
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            if [ -n "$ISSUE_NUMBER" ]; then
              {
                echo "No fix PR was produced for \`${COP}\`."
                echo ""
                echo "- Backend: \`${BACKEND_LABEL}\`"
                echo "- Model: \`${MODEL_LABEL_TEXT}\`"
                echo "- Mode: \`${MODE}\`"
                echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                echo ""
                echo "The agent produced no cop-file changes after replay."
              } > "$CLAIM_BODY_FILE"
              gh issue comment "$ISSUE_NUMBER" --repo "${REPO}" --body-file "$CLAIM_BODY_FILE"
              gh issue edit "$ISSUE_NUMBER" --repo "${REPO}" \
                --remove-label "state:pr-open" \
                --add-label "state:backlog" 2>/dev/null || true
            fi
            # Close the draft PR — agent produced nothing
            gh pr close "$PR_URL" --comment "Agent produced no changes." --delete-branch
            exit 0
          fi

          if git apply --3way "$AGENT_PATCH_FILE"; then
            echo "Patch applied cleanly"
          else
            echo "WARNING: patch had conflicts"
            git checkout --theirs -- . 2>/dev/null || true
            git add -A
            gh pr edit "$PR_URL" --add-label "needs-rebase"
          fi

          # Auto-format Rust files (agent often skips this)
          cargo fmt

          # Reject vacuous offense fixture edits before opening/readying the PR.
          cargo test --test integration offense_fixtures_have_no_unannotated_blocks

          git add src/cop/ tests/fixtures/cops/ bench/corpus/

          RETRY_NOTE=""
          if [ "$MODE" = "retry" ]; then RETRY_NOTE=" (retry)"; fi
          git commit --allow-empty -m "Fix ${COP}: agent-generated fix${RETRY_NOTE} ($BACKEND)"

          # Push changes, then replace with signed commit via API
          git push origin "$BRANCH" --force

          eval "$(python3 "$CI_SCRIPTS_DIR/workflow_git.py" promote \
            --repo "$REPO" \
            --branch "$BRANCH" \
            --message "Fix ${COP}: agent-generated fix${RETRY_NOTE} (${BACKEND})")"

          FINAL_CHANGED_FILES=$(gh api "repos/${REPO}/compare/main...${signed_sha}" --jq '(.files | length) // 0' 2>/dev/null || true)
          if [ -n "${FINAL_CHANGED_FILES}" ] && [ "${FINAL_CHANGED_FILES}" = "0" ]; then
            echo "Final PR diff is empty after replay/push"
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            if [ -n "$ISSUE_NUMBER" ]; then
              {
                echo "No usable fix PR was produced for \`${COP}\`."
                echo ""
                echo "- Backend: \`${BACKEND_LABEL}\`"
                echo "- Model: \`${MODEL_LABEL_TEXT}\`"
                echo "- Mode: \`${MODE}\`"
                echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                echo ""
                echo "The workflow rejected the result because replay/push collapsed to an empty PR."
              } > "$CLAIM_BODY_FILE"
              gh issue comment "$ISSUE_NUMBER" --repo "${REPO}" --body-file "$CLAIM_BODY_FILE"
              gh issue edit "$ISSUE_NUMBER" --repo "${REPO}" \
                --remove-label "state:pr-open" \
                --add-label "state:backlog" 2>/dev/null || true
            fi
            gh pr close "$PR_URL" --comment "Agent fix produced an empty PR after replay/push." --delete-branch
            exit 0
          fi

          # Build final PR body with agent results
          TURNS=$(jq -r '.num_turns // "?"' "$AGENT_RESULT_FILE" 2>/dev/null || echo "?")
          DIFF_STAT=$(git diff --stat "${parent_sha}".."${signed_sha}" 2>/dev/null | tail -1 || echo "")
          if [ -z "$DIFF_STAT" ]; then
            DIFF_STAT=$(gh api "repos/${REPO}/compare/${parent_sha}...${signed_sha}" --jq '"  \(.files | length) files changed"' 2>/dev/null || echo "")
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RESULT=$(jq -r '.result // "no result"' "$AGENT_RESULT_FILE" 2>/dev/null || echo "no result")
          LOGFILE=$(cat "$AGENT_LOGFILE_POINTER_FILE" 2>/dev/null || true)

          {
            echo "Automated ${MODE} fix for \`${COP}\` corpus conformance."
            echo ""
            if [ -n "$ISSUE_NUMBER" ]; then
              echo "Closes #${ISSUE_NUMBER}"
              echo ""
              echo "<!-- nitrocop-cop-issue: number=${ISSUE_NUMBER} cop=${COP} -->"
              echo ""
            fi
            echo "## Details"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Cop** | \`${COP}\` |"
            echo "| **Backend** | ${BACKEND_LABEL} |"
            echo "| **Model** | ${MODEL_LABEL_TEXT} |"
            echo "| **Mode** | ${MODE} |"
            echo "| **Turns** | ${TURNS} |"
            echo "| **Run** | [#${{ github.run_number }}](${RUN_URL}) |"
            echo ""
            echo "## Result"
            echo ""
            echo '```'
            echo "${RESULT}" | head -80
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            echo '```'
            echo "${DIFF_STAT}"
            echo '```'
            echo ""
            if [ -n "$LOGFILE" ]; then
              echo "<details>"
              echo "<summary>Agent conversation excerpt</summary>"
              echo ""
              python3 "$CI_SCRIPTS_DIR/agent_logs.py" extract "$LOGFILE" --max-lines 120 2>/dev/null || true
              echo ""
              echo "</details>"
              echo ""
            fi
            echo "<details>"
            echo "<summary>Task prompt (${{ steps.task.outputs.tokens }} tokens)</summary>"
            echo ""
            cat "$TASK_FILE"
            echo ""
            echo "</details>"
          } > "$PR_BODY_FILE"

          gh pr edit "$PR_URL" --body-file "$PR_BODY_FILE"

          # Mark PR as ready for review (no longer draft)
          gh pr ready "$PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "PR ready: $PR_URL"

          # Enable auto-merge (squash).
          # PR will merge automatically once CI passes + review approval.
          gh pr merge "$PR_URL" --auto --rebase --delete-branch

      # --- Cleanup: close draft PR if agent failed ---
      - name: Close draft PR on failure
        if: failure() && steps.claim.outputs.pr_url
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr close "${{ steps.claim.outputs.pr_url }}" \
            --comment "Agent failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --delete-branch
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            cat > "$CLAIM_BODY_FILE" <<EOF
          Agent fix failed before producing a usable PR for \`${{ github.event.inputs.cop }}\`.

          - Backend: \`${{ steps.selected_backend.outputs.display_label || github.event.inputs.backend }}\`
          - Model: \`${{ steps.backend.outputs.model_label || 'n/a' }}\`
          - Mode: \`${{ github.event.inputs.mode }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          See the workflow summary and uploaded artifacts for the agent result and recovery patch.
          EOF
            gh issue comment "${{ github.event.inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --body-file "$CLAIM_BODY_FILE"
            gh issue edit "${{ github.event.inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --remove-label "state:pr-open" \
              --add-label "state:backlog" 2>/dev/null || true
          fi

      - name: Comment linked issue on failure before PR claim
        if: failure() && !steps.claim.outputs.pr_url && github.event.inputs.issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cat > "$CLAIM_BODY_FILE" <<EOF
          Agent fix failed before it could create a draft PR for \`${{ github.event.inputs.cop }}\`.

          - Backend input: \`${{ github.event.inputs.backend }}\`
          - Mode: \`${{ github.event.inputs.mode }}\`
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Review the failed workflow run for details.
          EOF
          gh issue comment "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$CLAIM_BODY_FILE"
