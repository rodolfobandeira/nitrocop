name: Agent Cop Fix

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string
      backend:
        description: 'Backend family'
        type: choice
        options:
          - auto
          - codex
          - claude
          - claude-oauth
          - minimax
        default: auto
      strength:
        description: 'Model strength (used when backend is not auto)'
        type: choice
        options:
          - auto
          - normal
          - hard
        default: auto
      mode:
        description: 'Mode: fix (fresh) or retry (with prior attempt context)'
        type: choice
        options:
          - fix
          - retry
        default: fix
      issue_number:
        description: 'Optional linked cop tracker issue number'
        required: false
        type: string
      extra_context:
        description: 'Additional instructions for the agent (optional)'
        required: false
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      # --- Rust toolchain + cache ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      # On self-hosted: copy pre-warmed target into job workspace (each job
      # gets its own copy to avoid concurrent cargo lock contention)
      # On GitHub-hosted: use actions/cache to save/restore target/
      - name: Set up cargo cache
        run: |
          if [ -d "/home/runner/cargo-target-seed" ]; then
            echo "Self-hosted runner — seeding target/ from pre-warmed cache"
            cp -al /home/runner/cargo-target-seed target 2>/dev/null || \
              cp -r /home/runner/cargo-target-seed target
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          fi
        id: cargo-cache

      - uses: actions/cache@v5
        if: steps.cargo-cache.outputs.seeded != 'true'
        with:
          path: target
          key: agent-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: agent-target-

      - uses: astral-sh/setup-uv@v6

      - name: Initialize runtime layout
        run: |
          python3 scripts/workflows/agent_runtime.py agent-cop-fix \
            --runner-temp "${RUNNER_TEMP}" >> "$GITHUB_ENV"

      - name: Compute identifiers
        id: init
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py init \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --backend-input "${{ github.event.inputs.backend }}" \
            --strength-input "${{ github.event.inputs.strength }}" \
            --run-id "${{ github.run_id }}" \
            >> "$GITHUB_OUTPUT"

      # --- App token (needed for push + PR creation as 6[bot]) ---
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Generate read-only GitHub token
        id: actions-read-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read
          permission-metadata: read
          permission-pull-requests: read

      # --- Wait for main to be healthy before expensive build/agent work ---
      - name: Wait for healthy main
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: python3 scripts/workflows/wait_healthy_main.py --repo "${{ github.repository }}"

      # --- Build (before task generation for pre-diagnostic) ---

      # mold linker: cuts relink time from 30-60s to 2-5s for incremental builds
      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

      - name: Build binary
        run: |
          cargo build 2>&1
          CARGO_INCREMENTAL=1 cargo test --lib --no-run 2>&1

      # --- Task + backend ---

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/dispatch_cops.py task \
            "${{ github.event.inputs.cop }}" \
            --binary target/debug/nitrocop \
            --output "$TASK_FILE"
          echo "=== Task prompt stats ==="
          wc -l "$TASK_FILE"
          grep -c "CODE BUG\|CONFIG/CONTEXT\|CONFIRMED\|NOT REPRODUCED" "$TASK_FILE" || echo "no diagnostics"

          CODE_BUGS=$(grep -c "CODE BUG" "$TASK_FILE" || echo "0")
          CONFIG_ISSUES=$(grep -c "CONFIG/CONTEXT" "$TASK_FILE" || echo "0")
          echo "code_bugs=$CODE_BUGS" >> "$GITHUB_OUTPUT"
          echo "Code bugs: $CODE_BUGS, Config issues: $CONFIG_ISSUES"

          TOKENS=$(python3 scripts/workflows/count_tokens.py "$TASK_FILE")
          echo "tokens=$TOKENS" >> "$GITHUB_OUTPUT"
          echo "Tokens: $TOKENS"
        id: task

      - name: Select backend
        if: steps.task.outputs.code_bugs != '0'
        id: selected_backend
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py select-backend \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --backend-input "${{ github.event.inputs.backend }}" \
            --strength-input "${{ github.event.inputs.strength }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --binary target/debug/nitrocop \
            >> "$GITHUB_OUTPUT"

      - name: Resolve backend config
        if: steps.task.outputs.code_bugs != '0'
        id: backend
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py resolve-backend \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            >> "$GITHUB_OUTPUT"

      # --- Skip / Claim / Prompt ---

      - name: Skip if already fixed
        if: steps.task.outputs.code_bugs == '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py skip-fixed \
            --cop "${{ github.event.inputs.cop }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --backend-input "${{ github.event.inputs.backend }}" \
            --mode "${{ github.event.inputs.mode }}"

      - name: Claim PR
        if: steps.task.outputs.code_bugs != '0'
        id: claim
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py claim-pr \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --branch "${{ steps.init.outputs.branch }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label }}" \
            --model-label "${{ steps.backend.outputs.model_label }}" \
            --backend-reason "${{ steps.selected_backend.outputs.reason }}" \
            --repo "${{ github.repository }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --code-bugs "${{ steps.task.outputs.code_bugs }}" \
            --tokens "${{ steps.task.outputs.tokens }}" \
            >> "$GITHUB_OUTPUT"

      - name: Build prompt
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py build-prompt \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --extra-context "${{ github.event.inputs.extra_context }}" \
            --filter "${{ steps.init.outputs.filter }}"

      # --- Ruby ---

      - name: Install Ruby (for agent debugging)
        if: steps.task.outputs.code_bugs != '0'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: false

      - name: Install Ruby gems (for agent debugging)
        if: steps.task.outputs.code_bugs != '0'
        run: |
          # Read versions from vendor submodule tags to stay in sync
          V_RC=$(cd vendor/rubocop && git describe --tags --abbrev=0 | sed 's/^v//')
          V_PERF=$(cd vendor/rubocop-performance && git describe --tags --abbrev=0 | sed 's/^v//')
          V_RAILS=$(cd vendor/rubocop-rails && git describe --tags --abbrev=0 | sed 's/^v//')
          V_RSPEC=$(cd vendor/rubocop-rspec && git describe --tags --abbrev=0 | sed 's/^v//')
          gem install "rubocop:$V_RC" "rubocop-performance:$V_PERF" \
            "rubocop-rails:$V_RAILS" "rubocop-rspec:$V_RSPEC" prism --no-document

      # --- Prepare agent ---

      - name: Prepare agent
        if: steps.task.outputs.code_bugs != '0'
        id: prepare
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py prepare-branch \
            --branch "${{ steps.init.outputs.branch }}" \
            --cop "${{ github.event.inputs.cop }}" \
            --filter "${{ steps.init.outputs.filter }}" \
            >> "$GITHUB_OUTPUT"

      # --- Install + run agent ---

      - name: Run backend setup
        if: steps.task.outputs.code_bugs != '0'
        env:
          MINIMAX_API_KEY: ${{ steps.selected_backend.outputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ (steps.selected_backend.outputs.backend == 'claude-normal' || steps.selected_backend.outputs.backend == 'claude-hard') && secrets.ANTHROPIC_API_KEY || '' }}
          CODEX_AUTH_JSON: ${{ (steps.selected_backend.outputs.backend == 'codex-normal' || steps.selected_backend.outputs.backend == 'codex-hard') && secrets.CODEX_AUTH_JSON || '' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ (steps.selected_backend.outputs.backend == 'claude-oauth-normal' || steps.selected_backend.outputs.backend == 'claude-oauth-hard') && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
        run: ${{ steps.backend.outputs.setup_cmd }}

      - name: Mask read-only GitHub token
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/guard_backend_secrets.py \
            --from-env GH_TOKEN_FOR_ACTIONS_READ \
            emit-masks

      - name: Run agent
        if: steps.task.outputs.code_bugs != '0' && steps.backend.outputs.action != 'true'
        timeout-minutes: 45
        env:
          # Static env vars from resolve_backend (secrets injected separately)
          ANTHROPIC_BASE_URL: ${{ steps.backend.outputs.env_ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ steps.selected_backend.outputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ (steps.selected_backend.outputs.backend == 'claude-normal' || steps.selected_backend.outputs.backend == 'claude-hard') && secrets.ANTHROPIC_API_KEY || '' }}
          ANTHROPIC_MODEL: ${{ steps.backend.outputs.env_ANTHROPIC_MODEL }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ steps.backend.outputs.env_ANTHROPIC_SMALL_FAST_MODEL }}
          API_TIMEOUT_MS: ${{ steps.backend.outputs.env_API_TIMEOUT_MS }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: ${{ steps.backend.outputs.env_CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC }}
          CARGO_INCREMENTAL: "1"
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          # Background progress watcher
          python3 scripts/workflows/agent_logs.py watch \
            --newer-than "$FINAL_TASK_FILE" --interval 30 \
            --backend "${{ steps.backend.outputs.log_format }}" &
          WATCHER_PID=$!

          # Run the agent (command from resolve_backend)
          eval '${{ steps.backend.outputs.run_cmd }}'

          kill $WATCHER_PID 2>/dev/null || true

      - name: Start progress watcher (action)
        if: steps.task.outputs.code_bugs != '0' && steps.backend.outputs.action == 'true'
        run: |
          python3 scripts/workflows/agent_logs.py watch \
            --newer-than "$FINAL_TASK_FILE" --interval 30 \
            --backend claude &
          echo $! > ${RUNNER_TEMP}/action_watcher_pid

      # claude-code-action is REQUIRED for OAuth auth — do not replace with CLI invocation.
      - name: Run agent (action)
        if: steps.task.outputs.code_bugs != '0' && steps.backend.outputs.action == 'true'
        id: action_agent
        timeout-minutes: 45
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prepare.outputs.prompt_content }}
          claude_args: "--dangerously-skip-permissions --model claude-opus-4-6 --effort ${{ steps.backend.outputs.reasoning_effort }}"
          github_token: ${{ steps.actions-read-token.outputs.token }}
          allowed_bots: "github-actions[bot],6[bot]"
        env:
          ANTHROPIC_MODEL: ${{ steps.backend.outputs.env_ANTHROPIC_MODEL }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CARGO_INCREMENTAL: "1"
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}

      - name: Adapt action output
        if: steps.task.outputs.code_bugs != '0' && steps.backend.outputs.action == 'true'
        run: |
          kill "$(cat ${RUNNER_TEMP}/action_watcher_pid 2>/dev/null)" 2>/dev/null || true
          EXEC_FILE="${{ steps.action_agent.outputs.execution_file }}"
          if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            python3 scripts/workflows/adapt_action_output.py \
              "$EXEC_FILE" "$AGENT_RESULT_FILE"
          else
            echo '{"result":"no execution output"}' > "$AGENT_RESULT_FILE"
          fi

      # --- Post-agent ---

      - name: Snapshot and summarize
        if: always() && steps.task.outputs.code_bugs != '0'
        id: snapshot
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py snapshot \
            --base-sha "${{ steps.prepare.outputs.branch_base_sha }}" \
            --log-format "${{ steps.backend.outputs.log_format }}" \
            --cop "${{ github.event.inputs.cop }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            >> "$GITHUB_OUTPUT"

      - name: Scan generated files for backend secret leakage
        if: always() && steps.task.outputs.code_bugs != '0'
        id: leak_scan
        env:
          MINIMAX_API_KEY: ${{ steps.selected_backend.outputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ (steps.selected_backend.outputs.backend == 'claude-normal' || steps.selected_backend.outputs.backend == 'claude-hard') && secrets.ANTHROPIC_API_KEY || '' }}
          CODEX_AUTH_JSON: ${{ (steps.selected_backend.outputs.backend == 'codex-normal' || steps.selected_backend.outputs.backend == 'codex-hard') && secrets.CODEX_AUTH_JSON || '' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ (steps.selected_backend.outputs.backend == 'claude-oauth-normal' || steps.selected_backend.outputs.backend == 'claude-oauth-hard') && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/guard_backend_secrets.py \
            --ignore-missing \
            --from-env MINIMAX_API_KEY \
            --from-env ANTHROPIC_API_KEY \
            --from-env CODEX_AUTH_JSON \
            --from-env CLAUDE_CODE_OAUTH_TOKEN \
            --from-env GH_TOKEN_FOR_ACTIONS_READ \
            scan-manifest \
            "$AGENT_ARTIFACT_MANIFEST_FILE"

      - name: Publish summary
        if: always() && steps.task.outputs.code_bugs != '0' && steps.leak_scan.outcome == 'success'
        run: |
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent log
        if: always() && steps.task.outputs.code_bugs != '0' && steps.leak_scan.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: agent-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.snapshot.outputs.artifact_paths }}
          retention-days: 7

      # --- Validate + PR ---

      - name: Corpus regression gate
        if: steps.task.outputs.code_bugs != '0'
        run: |
          python3 scripts/check_cop.py "${{ github.event.inputs.cop }}" \
            --rerun --clone --sample 15 --binary target/debug/nitrocop

      - name: Finalize PR
        if: steps.task.outputs.code_bugs != '0'
        id: finalize
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN_FOR_ACTIONS_READ: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py finalize \
            --cop "${{ github.event.inputs.cop }}" \
            --branch "${{ steps.init.outputs.branch }}" \
            --base-sha "${{ steps.prepare.outputs.branch_base_sha }}" \
            --pr-url "${{ steps.claim.outputs.pr_url }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label }}" \
            --model-label "${{ steps.backend.outputs.model_label }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --tokens "${{ steps.task.outputs.tokens }}" \
            >> "$GITHUB_OUTPUT"

      # --- Cleanup: close draft PR if agent failed ---

      - name: Close draft PR on failure
        if: failure() && steps.claim.outputs.pr_url
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py cleanup-failure \
            --cop "${{ github.event.inputs.cop }}" \
            --pr-url "${{ steps.claim.outputs.pr_url }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label || github.event.inputs.backend }}" \
            --model-label "${{ steps.backend.outputs.model_label || 'n/a' }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --file-guard-valid "${{ steps.finalize.outputs.file_guard_valid || '' }}"

      - name: Comment linked issue on failure before PR claim
        if: failure() && !steps.claim.outputs.pr_url && github.event.inputs.issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py cleanup-failure \
            --cop "${{ github.event.inputs.cop }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --backend-label "${{ github.event.inputs.backend }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
