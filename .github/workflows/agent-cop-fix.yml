name: Agent Cop Fix

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string
      backend:
        description: 'Agent backend'
        type: choice
        options:
          - minimax
          - codex
        default: minimax
      mode:
        description: 'Mode: fix (fresh) or retry (with prior attempt context)'
        type: choice
        options:
          - fix
          - retry
        default: fix
      extra_context:
        description: 'Additional instructions for the agent (optional)'
        required: false
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # --- Rust toolchain + cache (before any file deletions) ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      # --- Fast steps ---

      - name: Compute identifiers
        id: cop
        run: |
          MODE="${{ github.event.inputs.mode }}"
          echo "::notice::${MODE^} cop: ${{ github.event.inputs.cop }} (backend: ${{ github.event.inputs.backend }})"
          python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          cop_snake = snake(name)
          print(f'branch=fix/{dept_dir}-{cop_snake}')
          print(f'filter=cop::{dept_dir}::{cop_snake}')
          " "${{ github.event.inputs.cop }}" >> "$GITHUB_OUTPUT"

      # --- Build (before task generation for pre-diagnostic) ---

      - name: Build binary
        run: |
          cargo build 2>&1
          CARGO_INCREMENTAL=1 cargo test --lib --no-run 2>&1

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/generate-cop-task.py \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --binary target/debug/nitrocop \
            --output /tmp/task.md
          echo "=== Task prompt stats ==="
          wc -l /tmp/task.md
          grep -c "CODE BUG\|CONFIG/CONTEXT\|CONFIRMED\|NOT REPRODUCED" /tmp/task.md || echo "no diagnostics"

      # --- Retry-only: collect prior attempts ---

      - name: Collect prior attempts
        if: github.event.inputs.mode == 'retry'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/collect_prior_attempts.py \
            --cop "${{ github.event.inputs.cop }}" \
            --output /tmp/prior_attempts.md

      - name: Close prior open PRs
        if: github.event.inputs.mode == 'retry'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COP="${{ github.event.inputs.cop }}"
          OPEN_PRS=$(gh pr list --state open --search "$COP in:title" --json number --jq '.[].number' 2>/dev/null || true)
          for pr in $OPEN_PRS; do
            echo "Closing stale PR #$pr"
            gh pr close "$pr" --comment "Superseded by retry attempt." 2>/dev/null || true
          done

      # --- Build final prompt (combines task + retry context + extra instructions) ---

      - name: Build final prompt
        run: |
          cp /tmp/task.md /tmp/final-task.md

          if [ -s /tmp/prior_attempts.md 2>/dev/null ]; then
            echo "" >> /tmp/final-task.md
            cat /tmp/prior_attempts.md >> /tmp/final-task.md
          fi

          if [ -n "${{ github.event.inputs.extra_context }}" ]; then
            echo "" >> /tmp/final-task.md
            echo "## Additional Instructions" >> /tmp/final-task.md
            echo "${{ github.event.inputs.extra_context }}" >> /tmp/final-task.md
          fi

          if [ "${{ github.event.inputs.mode }}" = "retry" ]; then
            echo "" >> /tmp/final-task.md
            echo "**CRITICAL:** Do NOT repeat approaches that already failed. Read the prior attempts carefully and try a DIFFERENT strategy." >> /tmp/final-task.md
          fi

          echo "=== Final prompt ==="
          wc -l /tmp/final-task.md

      - name: Prepare clean workspace for agent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "main_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git rm -r --quiet \
            CLAUDE.md AGENTS.md \
            .claude/ .agents/ .devcontainer/ .github/ gem/ scripts/ \
            2>/dev/null || true
          git commit -m "tmp: clean workspace for agent"
        id: prep

      # --- Install + run agent ---

      - name: Install agent CLI
        run: |
          if [ "${{ github.event.inputs.backend }}" = "minimax" ]; then
            curl -fsSL https://claude.ai/install.sh | bash
          else
            npm install -g @openai/codex@latest
          fi

      - name: Run agent
        timeout-minutes: 30
        env:
          ANTHROPIC_BASE_URL: ${{ github.event.inputs.backend == 'minimax' && 'https://api.minimax.io/anthropic' || '' }}
          ANTHROPIC_AUTH_TOKEN: ${{ github.event.inputs.backend == 'minimax' && secrets.MINIMAX_API_KEY || '' }}
          ANTHROPIC_MODEL: ${{ github.event.inputs.backend == 'minimax' && 'MiniMax-M2.7' || '' }}
          ANTHROPIC_SMALL_FAST_MODEL: ${{ github.event.inputs.backend == 'minimax' && 'MiniMax-M2.7' || '' }}
          API_TIMEOUT_MS: "300000"
          CARGO_INCREMENTAL: "1"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CODEX_AUTH_JSON: ${{ github.event.inputs.backend == 'codex' && secrets.CODEX_AUTH_JSON || '' }}
        run: |
          # Background progress watcher — shows what the agent is doing every 30s
          (
            sleep 10
            while true; do
              LOGFILE=$(find ~/.claude/projects -name '*.jsonl' -newer /tmp/final-task.md 2>/dev/null | head -1)
              if [ -n "$LOGFILE" ]; then
                LINES=$(wc -l < "$LOGFILE")
                # Show last assistant message or tool use summary
                LAST_TYPE=$(tail -1 "$LOGFILE" | jq -r '.type // "?"' 2>/dev/null || echo "?")
                LAST_TOOL=$(tail -5 "$LOGFILE" | jq -r 'select(.type == "assistant") | .message.content[]? | select(.type == "tool_use") | .name' 2>/dev/null | tail -1)
                LAST_TEXT=$(tail -5 "$LOGFILE" | jq -r 'select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text' 2>/dev/null | tail -c 200)
                echo "[progress] $(date +%H:%M:%S) | ${LINES} events | type: ${LAST_TYPE} | tool: ${LAST_TOOL:-n/a} | text: ${LAST_TEXT:-(none)}"
              else
                echo "[progress] $(date +%H:%M:%S) | waiting for session to start..."
              fi
              sleep 30
            done
          ) &
          WATCHER_PID=$!

          if [ "${{ github.event.inputs.backend }}" = "minimax" ]; then
            claude -p --dangerously-skip-permissions \
              --output-format json \
              "$(cat /tmp/final-task.md)" \
              > /tmp/agent-result.json \
              2> >(tee /tmp/agent.log >&2) || true
          else
            mkdir -p ~/.codex
            echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json
            codex exec --full-auto -m gpt-5.4 - < /tmp/final-task.md \
              > /tmp/agent-result.json \
              2> >(tee /tmp/agent.log >&2) || true
          fi

          kill $WATCHER_PID 2>/dev/null || true

          # Show summary
          echo "=== Agent Summary ==="
          echo "Cost: $(jq -r '.total_cost_usd // "?"' /tmp/agent-result.json 2>/dev/null)"
          echo "Turns: $(jq -r '.num_turns // "?"' /tmp/agent-result.json 2>/dev/null)"
          echo "Result: $(jq -r '.result // "no result"' /tmp/agent-result.json 2>/dev/null | head -20)"

      - name: Generate summary
        if: always()
        run: |
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ github.event.inputs.backend }}"
          MODE="${{ github.event.inputs.mode }}"

          {
            echo "# Agent Cop ${MODE^}: ${COP}"
            echo ""
            echo "**Backend:** ${BACKEND} | **Mode:** ${MODE}"
            echo "**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            # Agent result summary
            if [ -s /tmp/agent-result.json ]; then
              COST=$(jq -r '.total_cost_usd // "?"' /tmp/agent-result.json 2>/dev/null)
              TURNS=$(jq -r '.num_turns // "?"' /tmp/agent-result.json 2>/dev/null)
              RESULT=$(jq -r '.result // "no result"' /tmp/agent-result.json 2>/dev/null)
              echo "## Result"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Cost | \$${COST} |"
              echo "| Turns | ${TURNS} |"
              echo ""
              echo "### Agent Output"
              echo ""
              echo '```'
              echo "${RESULT}" | head -50
              echo '```'
            else
              echo "## Result"
              echo ""
              echo "No agent result (agent-result.json is empty or missing)."
            fi
            echo ""

            # Changes summary
            echo "## Changes"
            echo ""
            if git diff --stat HEAD~1 2>/dev/null | grep -q '.'; then
              echo '```'
              git diff --stat HEAD~1 2>/dev/null || echo "(no git diff available)"
              echo '```'
            else
              echo "No file changes detected."
            fi
            echo ""

            # Task prompt excerpt
            echo "## Task Prompt (first 30 lines)"
            echo ""
            echo '```markdown'
            head -30 /tmp/task.md 2>/dev/null || echo "(task.md not found)"
            echo '```'
            echo ""

            # Pre-diagnostic results
            DIAG=$(grep -A 50 "## Pre-diagnostic Results" /tmp/task.md 2>/dev/null | head -50)
            if [ -n "$DIAG" ]; then
              echo "## Pre-diagnostic Results"
              echo ""
              echo "$DIAG" | tail -n +2
              echo ""
            fi

            # Agent log tail
            if [ -s /tmp/agent.log ]; then
              echo "## Agent Log (last 30 lines)"
              echo ""
              echo '```'
              tail -30 /tmp/agent.log
              echo '```'
            fi
          } > /tmp/summary.md

          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/agent.log
            /tmp/agent-result.json
            /tmp/task.md
            /tmp/final-task.md
            /tmp/summary.md
            ~/.claude/projects/**/*.jsonl
          retention-days: 7

      # --- Validate + PR ---

      - name: Check for changes
        id: changes
        run: |
          UNCOMMITTED=false
          NEW_COMMITS=false
          if ! git diff --quiet; then
            UNCOMMITTED=true
          fi
          CLEANUP_SHA=$(git log --format=%H -1 --grep="tmp: clean workspace")
          if [ "$(git rev-parse HEAD)" != "$CLEANUP_SHA" ]; then
            NEW_COMMITS=true
          fi

          if [ "$UNCOMMITTED" = "true" ] || [ "$NEW_COMMITS" = "true" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected (uncommitted=$UNCOMMITTED, new_commits=$NEW_COMMITS)"
            git log --oneline "$CLEANUP_SHA"..HEAD 2>/dev/null || true
            git diff --stat 2>/dev/null || true
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes made"
          fi

      - name: Validate and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.cop.outputs.branch }}"
          COP="${{ github.event.inputs.cop }}"
          BACKEND="${{ github.event.inputs.backend }}"
          MODE="${{ github.event.inputs.mode }}"

          # Commit any uncommitted changes
          git add -A
          git commit -m "agent changes" --allow-empty

          # Extract changes to allowed paths
          git diff "${{ steps.prep.outputs.main_sha }}" HEAD -- \
            src/cop/ tests/fixtures/cops/ bench/corpus/ > /tmp/agent.patch

          # Restore full repo to original main (cleanup commit is on main,
          # so "git checkout main" is a no-op — must reset to main_sha)
          git checkout "${{ steps.prep.outputs.main_sha }}"

          if [ -s /tmp/agent.patch ]; then
            git apply /tmp/agent.patch

            # Validate
            cargo test --release --lib --no-run 2>&1
            cargo test --release --lib -- "${{ steps.cop.outputs.filter }}" 2>&1
            echo "Tests pass for ${COP}"

            # Create clean branch + PR
            git push origin --delete "$BRANCH" 2>/dev/null || true
            git checkout -b "$BRANCH"
            git add src/cop/ tests/fixtures/cops/ bench/corpus/

            RETRY_NOTE=""
            if [ "$MODE" = "retry" ]; then
              RETRY_NOTE=" (retry)"
            fi
            git commit -m "Fix ${COP}: agent-generated fix${RETRY_NOTE} ($BACKEND)"

            git push -u origin "$BRANCH"

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Fix ${COP}: agent-generated conformance fix${RETRY_NOTE}" \
              --body "Automated ${MODE} fix for ${COP} (backend: ${BACKEND}).

          ## Validation
          - [x] cargo test --lib passes for this cop
          - [ ] Full CI (checks.yml)
          - [ ] Corpus count check (agent-cop-check.yml)
          "
          else
            echo "No cop file changes found in agent output"
          fi
