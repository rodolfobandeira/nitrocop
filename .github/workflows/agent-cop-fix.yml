name: Agent Cop Fix

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo test --lib --no-run 2>&1

      - name: Compute branch name
        id: branch
        run: |
          BRANCH=$(python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          print(f'fix/{dept_dir}-{snake(name)}')
          " "${{ github.event.inputs.cop }}")
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/agent/generate-cop-task.py \
            "${{ github.event.inputs.cop }}" \
            --extended \
            --output /tmp/task.md
          wc -l /tmp/task.md

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Run Codex agent
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          # Restore ChatGPT-managed auth credentials
          mkdir -p ~/.codex
          echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json

          # Run Codex with the task prompt
          codex exec --full-auto - < /tmp/task.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes made by Codex"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Validate changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Quick validation: does it still compile and pass tests?
          cargo test --lib --no-run 2>&1
          echo "Build OK"

          # Run the specific cop's tests
          COP="${{ github.event.inputs.cop }}"
          FILTER=$(python3 -c "
          import re, sys
          cop = sys.argv[1]
          dept, name = cop.split('/', 1)
          def snake(s):
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', s)
              s = re.sub(r'([a-z0-9])([A-Z])', r'\1_\2', s)
              return s.lower()
          dept_map = {'RSpec': 'rspec', 'RSpecRails': 'rspec_rails', 'FactoryBot': 'factory_bot'}
          dept_dir = dept_map.get(dept, snake(dept))
          print(f'cop::{dept_dir}::{snake(name)}')
          " "$COP")
          cargo test --lib -- "$FILTER" 2>&1
          echo "Tests OK for $COP"

      - name: Commit, push, and create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          COP="${{ github.event.inputs.cop }}"

          # Delete old branch if exists
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Fix ${COP}: agent-generated fix

          Co-Authored-By: codex <noreply@github.com>"

          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Fix ${COP}: agent-generated conformance fix" \
            --body "Automated fix for ${COP} generated by Codex agent via agent-cop-fix workflow.

          ## Validation
          - [x] cargo test --lib passes for this cop
          - [ ] Full CI (checks.yml)
          - [ ] Corpus count check (agent-cop-check.yml)
          "
