name: Corpus Oracle

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: corpus-${{ github.ref }}-${{ github.event.inputs.corpus_size || 'standard' }}
  cancel-in-progress: true

on:
  # Manual trigger only — corpus oracle runs against hundreds of repos
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Run only this repo ID (e.g. 'multi_json__multi_json__c5fa9fc'), or 'all'"
        default: "all"
      corpus_size:
        description: "Corpus size: 'standard' (~1000 repos) or 'extended' (~5000 repos)"
        type: choice
        options:
          - standard
          - extended
        default: "standard"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build nitrocop release binary ──────────────────────────────
  build-nitrocop:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: nitrocop-binary
          path: target/release/nitrocop
          retention-days: 1

  # ── Compute matrix (batched, N repos per job) ──────────────────
  compute-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate matrix
        id: matrix
        run: |
          python3 << 'PYEOF'
          import json, os, sys, hashlib

          corpus_size = os.environ.get('CORPUS_SIZE', 'standard')
          BATCH_SIZE = 25 if corpus_size == 'extended' else 10

          repos = []
          with open('bench/corpus/manifest.jsonl') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      repos.append(json.loads(line))

          if corpus_size == 'extended':
              extended_path = 'bench/corpus/manifest_extended.jsonl'
              if os.path.exists(extended_path):
                  with open(extended_path) as f:
                      for line in f:
                          line = line.strip()
                          if line:
                              repos.append(json.loads(line))
                  print(f'Loaded extended manifest ({extended_path})', file=sys.stderr)

          repo_filter = os.environ.get('REPO_FILTER', 'all')
          if repo_filter != 'all':
              repos = [r for r in repos if r['id'] == repo_filter]
              if not repos:
                  print(f"ERROR: no repo matching '{repo_filter}' in manifest", file=sys.stderr)
                  sys.exit(1)

          # Round-robin batching: spread large repos (manifest sorted by stars)
          # across batches so no single batch gets all the biggest repos
          num_batches = (len(repos) + BATCH_SIZE - 1) // BATCH_SIZE
          rr_batches = [[] for _ in range(num_batches)]
          for i, repo in enumerate(repos):
              rr_batches[i % num_batches].append(repo)

          batches = []
          for batch_idx, chunk in enumerate(rr_batches):
              if not chunk:
                  continue
              # Stable cache key: hash of sorted repo IDs so adding repos
              # doesn't invalidate existing caches
              batch_repo_ids = '|'.join(sorted(r['id'] for r in chunk))
              batch_hash = hashlib.md5(batch_repo_ids.encode()).hexdigest()[:12]
              batches.append({
                  'batch_id': str(batch_idx),
                  'batch_hash': batch_hash,
                  'num_batches': str(num_batches),
              })

          print(f'{len(repos)} repos in {len(batches)} batches (batch_size={BATCH_SIZE}, corpus={corpus_size})', file=sys.stderr)
          if len(batches) > 256:
              print(f'ERROR: {len(batches)} batches exceeds GitHub Actions matrix limit of 256. Increase BATCH_SIZE.', file=sys.stderr)
              sys.exit(1)
          matrix = {'include': batches}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'matrix={json.dumps(matrix)}\n')
          PYEOF
        env:
          REPO_FILTER: ${{ github.event.inputs.repo_filter || 'all' }}
          CORPUS_SIZE: ${{ github.event.inputs.corpus_size || 'standard' }}

  # ── Run oracle on each batch of repos ────────────────────────────
  oracle-repo:
    needs: [build-nitrocop, compute-matrix]
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ github.event.inputs.corpus_size == 'extended' && 90 || 30 }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
        with:
          submodules: true

      - name: Download nitrocop binary
        uses: actions/download-artifact@v4
        with:
          name: nitrocop-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/nitrocop

      # Ruby version read from mise.toml
      - uses: ruby/setup-ruby@v1

      - name: Cache baseline bundle
        uses: actions/cache@v4
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-bundle-${{ hashFiles('bench/corpus/Gemfile') }}

      - name: Install baseline gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Export nitrocop cop list
        run: bin/nitrocop --list-cops > nitrocop-cops.txt

      - name: Compute rubocop cache keys
        id: rubocop-cache-key
        run: |
          # Rubocop results are deterministic for a given (repo SHA, rubocop version, config).
          # Cache key = hash of Gemfile + config + per-repo excludes + parser crash patch.
          # Including repo_excludes.json ensures cache invalidation when file exclusions change.
          # Including rescue_parser_crashes.rb ensures cache invalidation when crash handling changes.
          EXCLUDES_FILE="bench/corpus/repo_excludes.json"
          RESCUE_FILE="bench/corpus/rescue_parser_crashes.rb"
          EXTRA_HASH=""
          for f in "$EXCLUDES_FILE" "$RESCUE_FILE"; do
            if [ -f "$f" ]; then
              EXTRA_HASH="${EXTRA_HASH}$(sha256sum "$f" | cut -c1-16)"
            fi
          done
          KEY_HASH=$(echo "${EXTRA_HASH}" | cat - bench/corpus/Gemfile bench/corpus/baseline_rubocop.yml | sha256sum | cut -c1-16)
          echo "hash=${KEY_HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore cached rubocop results
        uses: actions/cache/restore@v4
        id: rubocop-cache
        with:
          path: rubocop-cache/
          # Key format: config_hash first, then batch_hash. This way restore-keys
          # can fall back to any batch with the same config when batch composition
          # changes (manifest edits shift which repos land in which batch).
          # Per-repo JSON files from a different batch are still valid — the loop
          # checks per-repo file existence and skips repos not in this batch.
          key: rubocop-${{ steps.rubocop-cache-key.outputs.hash }}-${{ matrix.batch_hash }}
          restore-keys: |
            rubocop-${{ steps.rubocop-cache-key.outputs.hash }}-

      - name: Compute batch repos
        id: batch-repos
        env:
          BATCH_ID: ${{ matrix.batch_id }}
          NUM_BATCHES: ${{ matrix.num_batches }}
          CORPUS_SIZE: ${{ github.event.inputs.corpus_size || 'standard' }}
          REPO_FILTER: ${{ github.event.inputs.repo_filter || 'all' }}
        run: |
          python3 << 'PYEOF'
          import json, os

          corpus_size = os.environ.get('CORPUS_SIZE', 'standard')
          batch_id = int(os.environ['BATCH_ID'])
          num_batches = int(os.environ['NUM_BATCHES'])

          repos = []
          with open('bench/corpus/manifest.jsonl') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      repos.append(json.loads(line))

          if corpus_size == 'extended':
              extended_path = 'bench/corpus/manifest_extended.jsonl'
              if os.path.exists(extended_path):
                  with open(extended_path) as f:
                      for line in f:
                          line = line.strip()
                          if line:
                              repos.append(json.loads(line))

          repo_filter = os.environ.get('REPO_FILTER', 'all')
          if repo_filter != 'all':
              repos = [r for r in repos if r['id'] == repo_filter]

          # Same round-robin as compute-matrix
          rr_batches = [[] for _ in range(num_batches)]
          for i, repo in enumerate(repos):
              rr_batches[i % num_batches].append(repo)

          chunk = rr_batches[batch_id] if batch_id < len(rr_batches) else []
          with open('batch_repos.json', 'w') as f:
              json.dump([{'id': r['id'], 'repo_url': r['repo_url'], 'sha': r['sha']} for r in chunk], f)
          print(f'Batch {batch_id}: {len(chunk)} repos')
          PYEOF

      - name: Run batch
        env:
          CORPUS_SIZE: ${{ github.event.inputs.corpus_size || 'standard' }}
        run: |
          mkdir -p results/nitrocop results/rubocop rubocop-cache

          while IFS= read -r row; do
            REPO_ID=$(echo "$row" | jq -r '.id')
            REPO_URL=$(echo "$row" | jq -r '.repo_url')
            REPO_SHA=$(echo "$row" | jq -r '.sha')

            echo "::group::${REPO_ID}"

            RUBOCOP_CACHED=false
            if [ -f "rubocop-cache/${REPO_ID}.json" ]; then
              echo "Using cached rubocop result for ${REPO_ID}"
              cp "rubocop-cache/${REPO_ID}.json" "results/rubocop/${REPO_ID}.json"
              RUBOCOP_CACHED=true
            fi

            # Clone — fetch exactly the pinned SHA at depth 1
            DEST="repos/${REPO_ID}"
            echo "Cloning ${REPO_ID} at ${REPO_SHA:0:7}..."
            git init "$DEST" --quiet || { echo "Init failed for ${REPO_ID}"; echo "::endgroup::"; continue; }
            git -C "$DEST" fetch --depth 1 "$REPO_URL" "$REPO_SHA" --quiet 2>/dev/null \
              || git -C "$DEST" fetch --depth 1 "$REPO_URL" --quiet \
              || { echo "Fetch failed for ${REPO_ID}"; rm -rf "$DEST"; echo "::endgroup::"; continue; }
            git -C "$DEST" checkout FETCH_HEAD --quiet 2>/dev/null \
              || echo "WARNING: checkout failed for ${REPO_ID}, using fetched HEAD"

            # Per-repo timeout (15 min each tool).
            # Keeps one slow repo from killing the whole batch.
            REPO_TIMEOUT=900  # 15 minutes

            # Resolve per-repo config (adds file exclusions for repos with known parser crashes)
            REPO_CONFIG=$(python3 bench/corpus/gen_repo_config.py "$REPO_ID" bench/corpus/baseline_rubocop.yml "$DEST")

            # nitrocop
            echo "=== nitrocop: ${REPO_ID} ==="
            rc=0
            timeout "${REPO_TIMEOUT}" \
            env BUNDLE_GEMFILE=$PWD/bench/corpus/Gemfile \
                BUNDLE_PATH=$PWD/bench/corpus/vendor/bundle \
            bin/nitrocop \
              --preview \
              --format json \
              --no-cache \
              --config "$REPO_CONFIG" \
              "$DEST" \
              > "results/nitrocop/${REPO_ID}.json" 2>"results/nitrocop/${REPO_ID}.err" || rc=$?

            if [ "$rc" -eq 124 ]; then
              echo "::warning::nitrocop timed out after ${REPO_TIMEOUT}s for ${REPO_ID}"
            fi

            # rubocop — skip if we have a cached result
            if [ "$RUBOCOP_CACHED" = false ]; then
              echo "=== rubocop: ${REPO_ID} ==="
              rc=0
              timeout "${REPO_TIMEOUT}" \
              env BUNDLE_GEMFILE=$PWD/bench/corpus/Gemfile \
                  BUNDLE_PATH=$PWD/bench/corpus/vendor/bundle \
              bundle exec rubocop \
                --require ./bench/corpus/rescue_parser_crashes.rb \
                --config "$REPO_CONFIG" \
                --format json \
                --force-exclusion \
                --cache false \
                "$DEST" \
                > "results/rubocop/${REPO_ID}.json" 2>"results/rubocop/${REPO_ID}.err" || rc=$?

              if [ "$rc" -eq 124 ]; then
                echo "::warning::rubocop timed out after ${REPO_TIMEOUT}s for ${REPO_ID}"
              fi
            fi

            # Resolve symlink paths in JSON output before deleting the repo.
            # RuboCop follows symlinks and reports offenses on both the symlink
            # path (e.g., docs/gem/foo.gemspec) and the canonical path (gem/foo.gemspec).
            # This causes phantom FP/FN when the tools pick different paths for the
            # same physical file. Resolving to realpath while the repo is still on
            # disk ensures consistent paths in the diff.
            python3 bench/corpus/resolve_symlink_paths.py \
              "results/nitrocop/${REPO_ID}.json" \
              "results/rubocop/${REPO_ID}.json" \
              2>/dev/null || true

            # Extract source context around offenses before deleting the repo.
            # This embeds ~7 lines of source code around each offense location
            # into the corpus results, enabling investigation without cloning repos.
            python3 bench/corpus/extract_context.py \
              --nitrocop-json "results/nitrocop/${REPO_ID}.json" \
              --rubocop-json "results/rubocop/${REPO_ID}.json" \
              --repo-dir "$DEST" \
              --output "results/context/${REPO_ID}.json" \
              --context-lines 7 \
              2>/dev/null || true

            # Save rubocop result to cache dir (will be persisted after the batch)
            if [ "$RUBOCOP_CACHED" = false ] && [ -f "results/rubocop/${REPO_ID}.json" ]; then
              cp "results/rubocop/${REPO_ID}.json" "rubocop-cache/${REPO_ID}.json"
            fi

            # Free disk space between repos
            rm -rf "$DEST"

            echo "::endgroup::"
          done < <(jq -c '.[]' batch_repos.json)

      - name: Save rubocop results cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: rubocop-cache/
          key: rubocop-${{ steps.rubocop-cache-key.outputs.hash }}-${{ matrix.batch_hash }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: corpus-results-${{ matrix.batch_id }}
          path: |
            results/
            nitrocop-cops.txt
          retention-days: 7
          include-hidden-files: false

  # ── Run synthetic benchmark (parallel with corpus batches) ────
  run-synthetic:
    needs: [build-nitrocop]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download nitrocop binary
        uses: actions/download-artifact@v4
        with:
          name: nitrocop-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/nitrocop

      - uses: ruby/setup-ruby@v1

      - name: Cache synthetic bundle
        uses: actions/cache@v4
        with:
          path: bench/synthetic/vendor/bundle
          key: synthetic-bundle-${{ hashFiles('bench/synthetic/Gemfile') }}

      - name: Install synthetic gems
        run: |
          cd bench/synthetic
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run synthetic benchmark
        run: |
          # run_synthetic.py expects the binary at target/release/nitrocop
          mkdir -p target/release
          cp bin/nitrocop target/release/nitrocop
          python3 bench/synthetic/run_synthetic.py --verbose

      - name: Upload synthetic results
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-results
          path: bench/synthetic/synthetic-results.json
          retention-days: 7

  # ── Collect and diff all results ───────────────────────────────
  collect-results:
    needs: [oracle-repo, run-synthetic]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ github.event.inputs.corpus_size == 'extended' && 20 || 10 }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: corpus-results-*
          path: all-results/
          merge-multiple: true

      - name: Download synthetic results
        uses: actions/download-artifact@v4
        with:
          name: synthetic-results
          path: synthetic-dl/

      - name: Place synthetic results
        run: cp synthetic-dl/synthetic-results.json bench/synthetic/synthetic-results.json

      - name: Diff and generate report
        run: |
          # Cop list is uploaded alongside results from any repo job
          COP_LIST=$(find all-results -name nitrocop-cops.txt -print -quit)
          # Context dir may not exist if all repos failed context extraction
          CONTEXT_DIR=""
          if [ -d "all-results/results/context" ]; then
            CONTEXT_DIR="--context-dir all-results/results/context"
          fi
          python3 bench/corpus/diff_results.py \
            --nitrocop-dir all-results/results/nitrocop \
            --rubocop-dir all-results/results/rubocop \
            --manifest bench/corpus/manifest.jsonl \
            --output-json corpus-results.json \
            --output-md corpus-results.md \
            ${COP_LIST:+--cop-list "$COP_LIST"} \
            $CONTEXT_DIR

      - name: Generate tiers.json
        run: |
          python3 bench/corpus/gen_tiers.py \
            --input corpus-results.json \
            --synthetic bench/synthetic/synthetic-results.json \
            --output tiers.json

      - name: Update README conformance
        if: github.event.inputs.corpus_size != 'extended'
        run: |
          python3 bench/corpus/update_readme.py \
            --input corpus-results.json \
            --synthetic bench/synthetic/synthetic-results.json \
            --manifest bench/corpus/manifest.jsonl \
            --readme README.md

      - name: Print summary
        run: |
          cat corpus-results.md
          # Step summary has a 1024k limit; keep just the top tables
          head -c 128000 corpus-results.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Update corpus report
        run: |
          if [ "${{ github.event.inputs.corpus_size }}" = "extended" ]; then
            cp corpus-results.md docs/corpus_extended.md
          else
            cp corpus-results.md docs/corpus.md
          fi

      - name: Generate cop coverage report
        if: github.event.inputs.corpus_size == 'extended'
        run: |
          SYNTH_ARG=""
          if [ -f bench/synthetic/synthetic-results.json ]; then
            SYNTH_ARG="--synthetic bench/synthetic/synthetic-results.json"
          fi
          python3 scripts/cop-coverage.py --input corpus-results.json $SYNTH_ARG > docs/cop_coverage.md

      - name: Upload report
        if: github.event.inputs.corpus_size != 'extended'
        uses: actions/upload-artifact@v4
        with:
          name: corpus-report
          path: |
            corpus-results.json
            corpus-results.md
            tiers.json
            bench/synthetic/synthetic-results.json
            docs/corpus.md
          retention-days: 30

      - name: Upload extended report
        if: github.event.inputs.corpus_size == 'extended'
        uses: actions/upload-artifact@v4
        with:
          name: corpus-report-extended
          path: |
            corpus-results.json
            corpus-results.md
            tiers.json
            bench/synthetic/synthetic-results.json
            docs/corpus_extended.md
            docs/cop_coverage.md
          retention-days: 30

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Open PR if tiers, README, or corpus report changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CORPUS_SIZE: ${{ github.event.inputs.corpus_size || 'standard' }}
        run: |
          CHANGED=false
          IS_EXTENDED=false
          if [ "$CORPUS_SIZE" = "extended" ]; then
            IS_EXTENDED=true
          fi

          if [ "$IS_EXTENDED" = false ]; then
            if ! diff -q tiers.json src/resources/tiers.json >/dev/null 2>&1; then
              CHANGED=true
            fi
            if ! git diff --quiet README.md; then
              CHANGED=true
            fi
            if ! git diff --quiet docs/corpus.md; then
              CHANGED=true
            fi
          else
            # Changed or new file
            if ! git diff --quiet docs/corpus_extended.md 2>/dev/null || \
               ! git ls-files --error-unmatch docs/corpus_extended.md >/dev/null 2>&1; then
              CHANGED=true
            fi
            if ! git diff --quiet docs/cop_coverage.md 2>/dev/null || \
               ! git ls-files --error-unmatch docs/cop_coverage.md >/dev/null 2>&1; then
              CHANGED=true
            fi
          fi

          if [ "$CHANGED" = false ]; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="corpus-oracle/update-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -B "$BRANCH"

          if [ "$IS_EXTENDED" = false ]; then
            if ! diff -q tiers.json src/resources/tiers.json >/dev/null 2>&1; then
              cp tiers.json src/resources/tiers.json
              git add src/resources/tiers.json
            fi
            git add -f README.md docs/corpus.md
            git commit -m "Update tiers.json, README, and corpus report from corpus oracle"
          else
            git add -f docs/corpus_extended.md docs/cop_coverage.md
            git commit -m "Update extended corpus report and cop coverage from corpus oracle"
          fi

          git push origin "$BRANCH"

          if [ "$IS_EXTENDED" = false ]; then
            gh pr create \
                --title "Update tiers.json and README from corpus oracle" \
                --body "$(cat <<'EOF'
          ## Summary

          Auto-generated from corpus oracle run.

          **Tiers**: Cops with any false positives across the corpus are demoted
          to preview tier. Stable = 0 FP, Preview = >= 1 FP.

          **README**: Conformance percentages and top-15 repo table updated
          from latest corpus results.

          **Corpus report**: Full conformance breakdown at docs/corpus.md.

          CI will validate the changes compile and pass tests.

          🤖 Generated by corpus oracle workflow
          EOF
          )" \
                --head "$BRANCH" \
                --base main
          else
            gh pr create \
                --title "Update extended corpus report" \
                --body "$(cat <<'EOF'
          ## Summary

          Auto-generated from extended corpus oracle run (~5000 repos).

          **Extended corpus report**: Full conformance breakdown at docs/corpus_extended.md.

          CI will validate the changes compile and pass tests.

          🤖 Generated by corpus oracle workflow (extended)
          EOF
          )" \
                --head "$BRANCH" \
                --base main
          fi
