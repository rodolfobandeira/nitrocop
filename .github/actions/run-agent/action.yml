name: Run Agent
description: >-
  Execute an AI agent backend (CLI or action) with proper secret injection,
  token masking, progress monitoring, and post-agent artifact collection.
  Backend configuration is resolved from resolve_backend.py at runtime.
  Action-based backends (claude-oauth) are run via claude-code-action;
  all others are run via CLI.

inputs:
  backend:
    description: Backend identifier (e.g. claude-normal, minimax, codex-hard)
    required: true
  actions_read_token:
    description: Read-only GitHub token (used for GH_TOKEN and masked via guard_backend_secrets)
    required: true
  anthropic_auth_token:
    description: Anthropic auth token (used by MiniMax backend via Claude CLI)
    default: ''
  anthropic_api_key:
    description: Anthropic API key secret
    default: ''
  codex_auth_json:
    description: Codex auth JSON secret
    default: ''
  claude_code_oauth_token:
    description: Claude Code OAuth token secret
    default: ''
  base_sha:
    description: Git ref to diff against for snapshot capture (empty = skip snapshot)
    default: ''
  workflow:
    description: Workflow name for artifact manifest and leak scan (empty = skip)
    default: ''
  diff_paths:
    description: Space-separated path filters for git diff (empty = all files)
    default: ''

outputs:
  artifact_paths:
    description: Newline-separated artifact paths for upload-artifact
    value: ${{ steps.post.outputs.artifact_paths }}
  leak_scan_ok:
    description: "'true' if leak scan passed"
    value: ${{ steps.post.outputs.leak_scan_ok }}

runs:
  using: composite
  steps:
    - name: Pre-agent snapshot
      if: inputs.base_sha != ''
      shell: bash
      run: |
        python3 scripts/workflows/git_activity_snapshot.py capture \
          --repo-root "$PWD" --output "$GIT_ACTIVITY_BEFORE_FILE" || true

    - name: Resolve backend
      id: resolve
      shell: bash
      env:
        BACKEND: ${{ inputs.backend }}
      run: |
        python3 scripts/workflows/resolve_backend.py "$BACKEND" \
          > "$RUNNER_TEMP/backend.env"
        cfg() { sed -n "s/^$1=//p" "$RUNNER_TEMP/backend.env"; }

        echo "action=$(cfg action)" >> "$GITHUB_OUTPUT"
        echo "model=$(cfg model)" >> "$GITHUB_OUTPUT"
        echo "reasoning_effort=$(cfg reasoning_effort)" >> "$GITHUB_OUTPUT"

        # Action backends need prompt as a step output since `uses:` steps
        # can't read files directly.
        if [ "$(cfg action)" = "true" ]; then
          {
            echo "prompt_content<<EOF"
            cat "$FINAL_TASK_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    # --- CLI backend path ---

    - name: Setup, mask, and run agent (CLI)
      if: steps.resolve.outputs.action != 'true'
      shell: bash
      env:
        BACKEND: ${{ inputs.backend }}
        GH_TOKEN: ${{ inputs.actions_read_token }}
        GH_TOKEN_FOR_ACTIONS_READ: ${{ inputs.actions_read_token }}
        CARGO_INCREMENTAL: '1'
        # Every secret under every name a backend might need.
        # Unused ones are empty strings — the backend ignores them.
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.anthropic_auth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        CODEX_AUTH_JSON: ${{ inputs.codex_auth_json }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
      run: |
        # Resolve backend config
        python3 scripts/workflows/resolve_backend.py "$BACKEND" \
          > "$RUNNER_TEMP/backend.env"
        cfg() { sed -n "s/^$1=//p" "$RUNNER_TEMP/backend.env"; }

        # Export non-secret env vars (ANTHROPIC_MODEL, API_TIMEOUT_MS, etc.)
        while IFS='=' read -r key value; do
          export "${key#env_}=$value"
        done < <(grep '^env_' "$RUNNER_TEMP/backend.env")

        # Run backend setup (installs CLI, masks backend secret)
        eval "$(cfg setup_cmd)"

        # Mask read-only GitHub token
        python3 scripts/workflows/guard_backend_secrets.py \
          --from-env GH_TOKEN_FOR_ACTIONS_READ \
          emit-masks

        # Background progress watcher + agent run
        python3 scripts/workflows/agent_logs.py watch \
          --newer-than "$FINAL_TASK_FILE" --interval 30 \
          --backend "$(cfg log_format)" &
        WATCHER_PID=$!

        eval "$(cfg run_cmd)"

        kill $WATCHER_PID 2>/dev/null || true

    # --- Action backend path (claude-code-action for OAuth auth) ---

    - name: Start progress watcher (action)
      if: steps.resolve.outputs.action == 'true'
      shell: bash
      run: |
        python3 scripts/workflows/agent_logs.py watch \
          --newer-than "$FINAL_TASK_FILE" --interval 30 \
          --backend claude &
        echo $! > "${RUNNER_TEMP}/action_watcher_pid"

    - name: Run agent (action)
      if: steps.resolve.outputs.action == 'true'
      id: action_agent
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        prompt: ${{ steps.resolve.outputs.prompt_content }}
        claude_args: "--dangerously-skip-permissions --model ${{ steps.resolve.outputs.model }} --effort ${{ steps.resolve.outputs.reasoning_effort }}"
        github_token: ${{ inputs.actions_read_token }}
        allowed_bots: "github-actions[bot],6[bot]"
      env:
        ANTHROPIC_MODEL: ${{ steps.resolve.outputs.model }}
        CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        CARGO_INCREMENTAL: "1"

    - name: Adapt action output
      if: steps.resolve.outputs.action == 'true'
      shell: bash
      run: |
        kill "$(cat "${RUNNER_TEMP}/action_watcher_pid" 2>/dev/null)" 2>/dev/null || true
        EXEC_FILE="${{ steps.action_agent.outputs.execution_file }}"
        if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
          python3 scripts/workflows/adapt_action_output.py \
            "$EXEC_FILE" "$AGENT_RESULT_FILE"
        else
          echo '{"result":"no execution output"}' > "$AGENT_RESULT_FILE"
        fi

    # --- Post-agent ---

    - name: Post-agent snapshot and leak scan
      if: always()
      id: post
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base_sha }}
        DIFF_PATHS: ${{ inputs.diff_paths }}
        WORKFLOW: ${{ inputs.workflow }}
        BACKEND: ${{ inputs.backend }}
        # Secrets needed for leak scanning
        ANTHROPIC_AUTH_TOKEN: ${{ inputs.anthropic_auth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        CODEX_AUTH_JSON: ${{ inputs.codex_auth_json }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        GH_TOKEN_FOR_ACTIONS_READ: ${{ inputs.actions_read_token }}
      run: |
        # Resolve backend config (re-read; step env is isolated)
        python3 scripts/workflows/resolve_backend.py "$BACKEND" \
          > "$RUNNER_TEMP/backend.env"
        cfg() { sed -n "s/^$1=//p" "$RUNNER_TEMP/backend.env"; }

        # --- Git snapshot ---
        if [ -n "$BASE_SHA" ]; then
          git status --short > "$AGENT_STATUS_FILE" || true
          git log --oneline "${BASE_SHA}"..HEAD > "$AGENT_COMMITS_FILE" || true

          DIFF_ARGS=()
          if [ -n "$DIFF_PATHS" ]; then
            # shellcheck disable=SC2206
            DIFF_ARGS=(-- $DIFF_PATHS)
          fi
          git diff --stat "$BASE_SHA" "${DIFF_ARGS[@]}" > "$AGENT_RECOVERY_STAT_FILE" || true
          git diff "$BASE_SHA" "${DIFF_ARGS[@]}" > "$AGENT_RECOVERY_DIFF_FILE" || true
          git diff --binary "$BASE_SHA" "${DIFF_ARGS[@]}" > "$AGENT_RECOVERY_PATCH_FILE" || true
        fi

        # --- Agent log finding ---
        python3 scripts/workflows/agent_logs.py find \
          --newer-than "$FINAL_TASK_FILE" \
          --backend "$(cfg log_format)" > "$AGENT_LOGFILE_POINTER_FILE" 2>/dev/null || true

        # --- Git activity after + report ---
        python3 scripts/workflows/git_activity_snapshot.py capture \
          --repo-root "$PWD" --output "$GIT_ACTIVITY_AFTER_FILE" || true
        if [ -f "$GIT_ACTIVITY_BEFORE_FILE" ]; then
          python3 scripts/workflows/git_activity_snapshot.py report \
            --before "$GIT_ACTIVITY_BEFORE_FILE" \
            --after "$GIT_ACTIVITY_AFTER_FILE" \
            --out-dir "$AGENT_GIT_ACTIVITY_DIR" || true
        fi

        # --- Artifact manifest + leak scan ---
        LEAK_OK="true"
        if [ -n "$WORKFLOW" ]; then
          python3 scripts/workflows/agent_artifacts.py "$WORKFLOW" \
            --runtime-root "$AGENT_RUNTIME_ROOT" \
            --output "$AGENT_ARTIFACT_MANIFEST_FILE"

          python3 scripts/workflows/guard_backend_secrets.py \
            --ignore-missing \
            --from-env ANTHROPIC_AUTH_TOKEN \
            --from-env ANTHROPIC_API_KEY \
            --from-env CODEX_AUTH_JSON \
            --from-env CLAUDE_CODE_OAUTH_TOKEN \
            --from-env GH_TOKEN_FOR_ACTIONS_READ \
            scan-manifest "$AGENT_ARTIFACT_MANIFEST_FILE" || LEAK_OK="false"
        fi

        # --- Outputs ---
        {
          echo "artifact_paths<<EOF"
          cat "$AGENT_ARTIFACT_MANIFEST_FILE" 2>/dev/null || true
          echo "EOF"
          echo "leak_scan_ok=$LEAK_OK"
        } >> "$GITHUB_OUTPUT"
